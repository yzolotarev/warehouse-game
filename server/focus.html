<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="/assets/favicon.png">
<meta charset="utf-8">
<meta name="theme-color" content="#101014">
<meta name="color-scheme" content="dark light">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/welcome.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script><script src="/ambient.js"></script><script src="/juice.js"></script>
<title>🎯 Фокус</title>
<style>
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(640px,94vw);padding:26px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{margin:0}
  #sub{margin-bottom:20px}
  .card{text-align:center}
  .task{margin:12px 0 22px}
  button{margin:0 5px}
  #pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:16px}
  #cnt{color:var(--dim);font-size:13px}
  .muted{color:var(--dim);text-align:center;padding:40px 0;font-size:15px}
  .fly{animation:fly .45s ease forwards}
  @keyframes fly{to{transform:translateY(-90px);opacity:0}}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  a{font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
</style>
</head>
<body><div id="wrap">
  <h1>🎯 Фокус <span style="color:var(--dim);font-weight:normal">= делаю сейчас (≤5)</span></h1>
  <div id="sub">одна задача на экране - её и делай · ⭐ = главное на завтра, утром покажу её первой</div>
  <div id="star-banner" style="display:none;margin-bottom:10px;padding:10px 14px;border-radius:10px;border:1px solid var(--gold);color:var(--gold);font-size:13px;cursor:pointer" onclick="unstarAll();"></div>
  <div id="stage"></div>
  <div id="pager" style="display:none">
    <button class="b-ghost" onclick="pg(-1)">‹</button><span id="cnt"></span><button class="b-ghost" onclick="pg(1)">›</button>
  </div>
  <a href="/">← в прихожую склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
let items=[], i=0;
async function api(p,body){const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});return r.json()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function beep(f,d){try{const a=beep.ac=beep.ac||new AudioContext(),o=a.createOscillator(),g=a.createGain();
  o.type='triangle';o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(a.destination);
  o.start();g.gain.exponentialRampToValueAtTime(1e-4,a.currentTime+d);o.stop(a.currentTime+d)}catch(e){}}
let staleDays=3, dryPallets=[], hiddenStars=0, hiddenStarIds=[], pinnedText='';
let timerSession=null, timerBoxId=null, timerInterval=null;
function fmtElapsed(s){
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), se=s%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(se).padStart(2,'0');
}
async function checkTimer(){
  if(!items.length)return;
  const d=await api('/timer/active');
  if(d.active){timerSession=d.session;timerBoxId=d.session.box_id;
    if(timerInterval)clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
      const el=$('#timer-elapsed');
      if(el&&timerSession&&timerBoxId===items[i]?.id){
        const sec=Math.floor((Date.now()-new Date(timerSession.started_at+'Z').getTime())/1000);
        el.textContent=fmtElapsed(sec);
      }
    },1000);
  }else{timerSession=null;timerBoxId=null;
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  }
}
async function load(){
  const d=await api('/focus');
  items=d.items; staleDays=d.stale_days; dryPallets=d.dry_pallets||[];
  hiddenStars=d.hidden_stars||0; hiddenStarIds=d.hidden_star_ids||[];
  i=Math.min(i,Math.max(0,items.length-1)); render();
  await checkTimer();
  try{pinnedText=(await api('/pin')).text||'';render();}catch(e){}
}
function render(){
  const sb=$('#star-banner');
  if(hiddenStars){
    sb.style.display='block';
    sb.textContent=`⭐ ${hiddenStars} задач(а) отложены до завтра после 3:00 · нажмите чтобы снять все звёзды`;
  }else{sb.style.display='none';}
  if(!items.length){
    // тяга: фокус пуст → зовём доить проекты вместо тупика «наполни на разборе»
    const milk=dryPallets.length
      ?'<div style="margin-top:14px">'+dryPallets.map(p=>`<button class="b-primary" style="display:block;width:100%;margin:6px 0;white-space:normal" onclick="location.href='/pallets_page#p${p.id}'">🥛 Подоить проект: ${esc(p.title)}</button>`).join('')
        +'<div class="meta" style="margin-top:8px">сними с проекта следующий конкретный шаг — и он появится тут</div></div>':'';
    $('#stage').innerHTML='<div class="card muted"><img class="empty-ill" src="/assets/empty-focus.png" alt="">Фокус пуст.'
      +(dryPallets.length?' Проекты ждут доения ↓':' Наполни его на разборе инбокса. ✨')+milk+'</div>';
    $('#pager').style.display='none';return}
  const b=items[i];
  const stale=b.idle_days>staleDays;
  const pal=b.pallet_title?` · 🧱 ${esc(b.pallet_title)}`:'';
  const dust=stale?` · <span style="color:var(--sand)">🕸 лежит ${b.idle_days} дн.</span>`:'';
  // ПДВ: награда видна ДО действия; серия — бонус за шаги одной паллеты за день
  const reward=b.reward+b.series+(b.series?` <span style="color:var(--vio)">(серия 🧱 +${b.series})</span>`:'');
  // перекус-кредит: минуты ютуба за шаг (🎲 = изредка больше); творческий проект — без него
  const ytRow=b.yt?`<div class="meta" style="margin-top:10px">🎬 этот шаг даст +${b.yt} мин перекуса (иногда 🎲 больше)</div>`:'';
  const sib=b.pallet_id&&items.some(o=>o.id!==b.id&&o.pallet_id===b.pallet_id);
  const hint=(sib&&!b.series)?'<div class="meta" style="margin-top:10px">💡 в фокусе ещё шаг этой паллеты: второй за день пойдёт серией, с бонусом</div>':'';
  const staleRow=stale?`<div style="margin-top:12px">
      <button class="b-ghost" onclick="shelve(${b.id})">🗄 На стеллаж (позже)</button>
    </div>`:'';
  // 👁 распознавание старого: со второго захода подсознание уже вынесло вердикт -
  // либо «неактуально», либо «я знаю решение». Обе кнопки - выходы из склада
  const visitRow=(b.visits>=2)?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line)">
      <div class="meta" style="margin-bottom:6px">👁 заход №${b.visits} · лежит с ${b.born_at.slice(0,10)}</div>
      <button class="b-ghost" onclick="recognize(${b.id},'stale')">🗑 Уже неактуально</button>
      <button class="b-ghost" onclick="recognize(${b.id},'known')">💡 Я знаю решение — в фокус</button>
    </div>`:'';
  const isThink=b.scary_kind==='think';
  const isReturned=b.scary_kind==='returned';
  let doneList=[];try{doneList=JSON.parse(b.scary_done||'[]');}catch(e){}
  const starBtn=b.starred
    ?`<button class="b-sec" style="color:var(--gold)" title="снять звезду" onclick="setStar(${b.id},false)">⭐ на завтра</button>`
    :`<button class="b-ghost" title="звезда = главное на завтра (утром решений ноль)" onclick="setStar(${b.id},true)">☆ на завтра</button>`;
  const pinned=pinnedText&&pinnedText===b.raw_text;
  const pinBtn=pinned
    ?`<button class="b-sec" style="color:var(--vio)" title="снять с экрана" onclick="togglePin(0)">📌 висит поверх окон</button>`
    :`<button class="b-ghost" title="показать поверх всех окон в углу экрана, чтобы не отвлекаться" onclick="togglePin(${b.id})">📌 Вывесить</button>`;
  const head=`<div class="meta">${b.starred?'⭐ ':''}#${b.id} · родилась ${b.born_at.slice(0,10)}${pal}${dust}${b.elapsed_seconds_total?` · ⏱ ${fmtElapsed(b.elapsed_seconds_total)}`:''}</div>
    <div class="task">${esc(b.raw_text)}</div>`;
  let body;
  if(isThink){
    // авто-шаг спрятанной страшной задачи: сделал → выписываешь надуманные шаги
    body=head+`<div class="meta" style="margin:4px 0 10px">страшная задача спрятана — сделай только это, потом выпишешь шаги</div>
      <div id="scarybox"><button class="b-ok" onclick="openScarySteps(${b.scary_parent})">✅ Подумал — выписать шаги</button></div>`;
  }else if(isReturned){
    // вернувшаяся задача: цепочка шагов пройдена, решай судьбу
    const doneRow=doneList.length?`<div class="meta" style="margin:8px 0;padding:8px 10px;border:1px solid var(--vio);border-radius:8px;text-align:left"><i>для неё уже сделано:<br>${doneList.map(s=>'· '+esc(s)).join('<br>')}</i></div>`:'';
    body=head+doneRow+`<div style="margin-top:8px">
      <button class="b-ok" onclick="done(${b.id})">✅ Сделал +${reward}</button>
      <button class="b-sec" onclick="scaryMore(${b.id})">➕ ещё шаг</button>
      <button class="b-danger" title="удалить" onclick="toTrash(${b.id})">🗑</button>
    </div>`;
  }else{
    body=head+`
    ${b.ai_note?`<div class="meta" style="margin:4px 0 10px;padding:8px 10px;border:1px solid var(--vio);border-radius:8px;text-align:left;white-space:pre-wrap">🤖 отчёт ИИ: ${esc(b.ai_note)}</div>`:''}
    <button class="b-ok" onclick="done(${b.id})">✅ Сделал +${reward}</button>
    ${starBtn}
    ${pinBtn}
    <span id="timer-row" style="display:inline-block;margin:6px 0">
      <span id="timer-elapsed" style="font-size:14px;color:var(--vio);${timerBoxId===b.id?'':'display:none'}">${timerBoxId===b.id&&timerSession?fmtElapsed(Math.floor((Date.now()-new Date(timerSession.started_at+'Z').getTime())/1000)):''}</span>
      <button class="${timerBoxId===b.id?'b-sec':'b-ghost'}" style="${timerBoxId===b.id?'border-color:var(--vio)':''}" id="timer-btn" onclick="toggleTimer(${b.id})">${timerBoxId===b.id?'⏹ Стоп':'▶ Таймер'}</button>
    </span>
    <button class="b-ghost" title="жду человека/события - уйдёт в Ожидание, напомнит само"
      onclick="toWait(${b.id})">⏳ Жду</button>
    <button class="b-danger" title="уже неактуально" onclick="toTrash(${b.id})">🗑</button>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)">
      <button class="b-ghost" title="слишком страшно/крупно — спрятать и вынести первый шаг" onclick="scaryHide(${b.id})">😰 Страшно</button>
      <button class="b-ghost" title="разбить на 2+ отдельных задач без проекта" onclick="openSplit(${b.id})">✂ Разбить</button>
    </div>
    <div id="scarybox"></div><div id="splitbox"></div>
    ${ytRow}${hint}${staleRow}${visitRow}`;
  }
  $('#stage').innerHTML=`<div class="card in" id="c" ${b.starred?'style="border-color:var(--gold)"':''}>${body}</div>`;
  $('#pager').style.display=items.length>1?'flex':'none';
  $('#cnt').textContent=(i+1)+' / '+items.length;
}
function pg(d){i=(i+d+items.length)%items.length;render()}
async function recognize(id,verdict){
  await api('/recognize',{id,verdict});
  window.juice&&juice('recognize');
  i=0;await load();
}
// 😰 Страшно: задача прячется целиком, наружу выходит цепочка мелких шагов.
async function scaryHide(id){
  try{await api('/scary',{id});}catch(e){$('#hint')&&($('#hint').textContent='⚠ '+e.message);return;}
  window.juice&&juice('ship');beep(560,.12);
  i=0;await load();
}
// think-шаг сделан: показать поле «выпиши, что надумал» (строка = шаг)
function openScarySteps(parentId){
  const box=document.getElementById('scarybox');
  if(!box)return;
  box.innerHTML='<textarea id="scaryta" rows="4" style="width:100%;box-sizing:border-box;padding:10px 12px;font-size:15px" '
    +'placeholder="что надумал — по строчке на шаг&#10;например: открыть телеграм и найти чат&#10;написать одну строку"></textarea>'
    +`<button class="b-ok" style="margin-top:8px" onclick="scaryStepsSubmit(${parentId})">▶ Так и запишем</button>`;
  const ta=document.getElementById('scaryta');ta&&ta.focus();
}
async function scaryStepsSubmit(parentId){
  const ta=document.getElementById('scaryta');
  const lines=(ta?ta.value:'').split('\n').map(s=>s.trim()).filter(Boolean);
  try{await api('/scary_steps',{parent:parentId,lines});}catch(e){return;}
  window.juice&&juice('ship');beep(620,.12);
  i=0;await load();
}
// вернувшаяся задача: ещё один шаг
async function scaryMore(id){
  const t=prompt('Ещё один шаг для этой задачи:');
  if(!t||!t.trim())return;
  try{await api('/scary_more',{id,text:t.trim()});}catch(e){return;}
  window.juice&&juice('ship');i=0;await load();
}
// ✂ Разбить на 2+ задачи (части остаются в фокусе)
function openSplit(id){
  const box=document.getElementById('splitbox');
  if(!box)return;
  box.innerHTML='<textarea id="splitta" rows="4" style="width:100%;box-sizing:border-box;padding:10px 12px;font-size:15px" '
    +'placeholder="одна строка = одна задача (минимум две)"></textarea>'
    +`<button class="b-ok" style="margin-top:8px" onclick="splitSubmit(${id})">✂ Разбить</button>`;
  const ta=document.getElementById('splitta');ta&&ta.focus();
}
async function splitSubmit(id){
  const ta=document.getElementById('splitta');
  const parts=(ta?ta.value:'').split('\n').map(s=>s.trim()).filter(Boolean);
  if(parts.length<2){ta&&ta.focus();return;}
  try{await api('/split',{id,parts});}catch(e){$('#hint')&&($('#hint').textContent='⚠ '+e.message);return;}
  window.juice&&juice('ship');beep(600,.12);
  i=0;await load();
}
async function toggleTimer(id){
  if(timerBoxId===id){
    // stop
    await api('/timer/stop',{box_id:id});
    timerSession=null;timerBoxId=null;
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
    window.juice&&juice('done');
    beep(500,.1);
    const cur=items[i]&&items[i].id;
    await load();
    i=Math.max(0,items.findIndex(o=>o.id===cur));render();
  }else{
    // start
    try{
      const r=await api('/timer/start',{box_id:id});
      timerSession={started_at:r.started_at};timerBoxId=id;
      if(timerInterval)clearInterval(timerInterval);
      timerInterval=setInterval(()=>{
        const el=$('#timer-elapsed');
        if(el&&timerBoxId===items[i]?.id){
          const sec=Math.floor((Date.now()-new Date(timerSession.started_at+'Z').getTime())/1000);
          el.textContent=fmtElapsed(sec);
        }
      },1000);
      beep(660,.12);
      const cur=items[i]&&items[i].id;
      await load();
      i=Math.max(0,items.findIndex(o=>o.id===cur));render();
    }catch(e){}
  }
}
async function mv(id,to){
  const r=await fetch('/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,to})});
  if(r.status===423){$('#stage').insertAdjacentHTML('afterbegin',
    '<div class="card" style="border-color:var(--danger);color:var(--danger);margin-bottom:12px;cursor:pointer" onclick="location.href=\'/terminal\'">⛔ Склад стоит: разбери инбокс →</div>');
    throw new Error('blocked')}
  return r.json()
}
async function unpinIfCurrent(id){
  const b=items.find(o=>o.id===id);
  if(b&&pinnedText&&pinnedText===b.raw_text){await api('/pin',{text:''}).catch(()=>{});pinnedText='';}
}
async function done(id){
  await unpinIfCurrent(id);
  // авто-стоп таймера если тикает на этой задаче
  if(timerBoxId===id){
    await api('/timer/stop',{box_id:id}).catch(()=>{});
    timerSession=null;timerBoxId=null;
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  }
  $('#c').classList.add('fly');beep(700,.15);setTimeout(()=>beep(900,.2),100);
  let r;try{r=await mv(id,'done')}catch(e){return}
  window.juice&&juice('done');
  if(r&&r.yt_bonus){beep(1200,.25); // 🎲 вариативная награда: редкий сюрприз-бонус
    $('#stage').insertAdjacentHTML('afterbegin',
      `<div class="card" style="border-color:var(--gold);color:var(--gold);margin-bottom:12px">🎲 Повезло! +${r.yt} мин перекуса вместо обычных</div>`);}
  // шарнир done→next: проект остался без заряженного шага → ловим горячий момент
  if(r&&r.pallet_dry){setTimeout(()=>nextStepPrompt(r.pallet_dry),r.yt_bonus?1600:350);return}
  setTimeout(load,r&&r.yt_bonus?1600:350);
}
function nextStepPrompt(pd){
  $('#stage').innerHTML=`<div class="card in">
    <div class="task" style="font-size:17px">✅ Шаг закрыт. Проект «${esc(pd.title)}» без следующего шага.</div>
    <div class="meta" style="margin:8px 0">пока голова в контексте — задай следующий одной фразой (или пропусти):</div>
    <input id="nx" placeholder="следующий шаг — маленький и конкретный" onkeydown="if(event.key==='Enter')submitNext(${pd.id})">
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="b-ok" onclick="submitNext(${pd.id})">→ 🎯 Дальше</button>
      <button class="b-ghost" onclick="load()">Пропустить →</button>
    </div>
  </div>`;
  $('#pager').style.display='none';
  const el=$('#nx'); if(el)el.focus();
}
async function submitNext(pid){
  const v=$('#nx').value.trim();
  if(!v){load();return}
  // на шарнире шаг идёт СРАЗУ в фокус (сохраняем импульс + серию), не в очередь
  let r;try{r=await api('/pallet/step',{pallet_id:pid,text:v})}catch(e){load();return}
  try{await api('/move',{id:r.step_id,to:'focus'})}catch(e){}
  beep(560,.12);window.juice&&juice('milk');load();
}
async function toWait(id){
  await unpinIfCurrent(id);
  if(timerBoxId===id){await api('/timer/stop',{box_id:id}).catch(()=>{});timerSession=null;timerBoxId=null;if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
  $('#c').classList.add('fly');beep(300,.12);
  try{await mv(id,'waiting')}catch(e){return} // grow-таймер 1-3-7-14 по умолчанию
  window.juice&&juice('wait');
  setTimeout(load,350);
}
async function shelve(id){
  await unpinIfCurrent(id);
  if(timerBoxId===id){await api('/timer/stop',{box_id:id}).catch(()=>{});timerSession=null;timerBoxId=null;if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
  $('#c').classList.add('fly');beep(340,.1);
  try{await mv(id,'rack')}catch(e){return}
  window.juice&&juice('shelve');
  setTimeout(load,350);
}
async function setStar(id,on){
  const r=await fetch('/star',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,on})});
  if(r.status===409){beep(180,.12);
    $('#stage').insertAdjacentHTML('afterbegin',
      '<div class="card" style="border-color:var(--gold);color:var(--gold);margin-bottom:12px">уже 4 ⭐ — сними одну, окрестность внимания не резиновая</div>');
    setTimeout(load,1800);return}
  beep(on?880:340,.12);
  if(on){const m=document.createElement('div');m.className='card in';
    m.style.cssText='border-color:var(--gold);color:var(--gold);margin-bottom:12px;padding:10px';
    m.textContent='⭐ Звезда зажжена — покажется завтра после 3:00';
    $('#stage').insertAdjacentElement('afterbegin',m);setTimeout(()=>m.remove(),2500);}
  const cur=items[i]&&items[i].id;
  await load();
  i=Math.max(0,items.findIndex(o=>o.id===cur));render();
}
async function togglePin(id){
  const b=id?items.find(o=>o.id===id):null;
  await api('/pin',{text:b?b.raw_text:''});
  beep(b?720:300,.1);
  pinnedText=b?b.raw_text:'';
  render();
}
async function toTrash(id){
  await unpinIfCurrent(id);
  if(timerBoxId===id){await api('/timer/stop',{box_id:id}).catch(()=>{});timerSession=null;timerBoxId=null;if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
  $('#c').classList.add('fly');beep(180,.12);
  try{await mv(id,'trash')}catch(e){return}
  setTimeout(load,350);
}
async function unstarAll(){
  for(const x of items){if(x.starred)try{await api('/star',{id:x.id,on:false})}catch(e){}}
  beep(440,.1);load();
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowLeft')pg(-1); if(e.key==='ArrowRight')pg(1);
  const btns=document.querySelectorAll('#stage button'),n=parseInt(e.key,10);
  if(n>=1&&n<=btns.length)btns[n-1].click();
});
load();
</script>
