<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="/assets/favicon.png">
<meta charset="utf-8">
<meta name="theme-color" content="#101014">
<meta name="color-scheme" content="dark light">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/welcome.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script><script src="/ambient.js"></script><script src="/juice.js"></script>
<title>🗄 Стеллажи</title>
<style>
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(640px,94vw);padding:24px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{margin:0}
  #sub{margin-bottom:18px}
  .card{text-align:center}
  .task{margin:12px 0 22px}
  .ctx{display:inline-block;background:var(--accent-soft);border-radius:20px;
    padding:4px 12px;font-size:13px;color:var(--accent);margin-bottom:6px}
  button{margin:0 5px}
  .muted{color:var(--dim);text-align:center;padding:40px 0;font-size:15px}
  #stage{flex:1 1 auto;overflow-y:auto;min-height:0}
  #q{width:100%;box-sizing:border-box;margin-bottom:10px}
  .row{display:flex;gap:10px;align-items:baseline;padding:10px 12px;border-radius:9px;cursor:pointer}
  .row:hover{background:var(--accent-soft)}
  .rctx{font-size:12px;color:var(--accent);white-space:nowrap}
  .rage{font-size:12px;color:var(--dim);margin-left:auto;white-space:nowrap}
  .fly{animation:fly .4s ease forwards}
  @keyframes fly{to{transform:translateX(120%) rotate(5deg);opacity:0}}
  .flyl{animation:flyl .35s ease forwards}
  @keyframes flyl{to{transform:translateX(-120%) rotate(-4deg);opacity:0}}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  #banner{display:none;background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);
    padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:14px;cursor:pointer}
  a{font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
</style>
</head>
<body><div id="wrap">
  <h1>🗄 Отложенное <span style="color:var(--dim);font-weight:normal">= сделаю позже, не на этой неделе (стеллажи)</span></h1>
  <div id="sub">по одному товару: берёшь в работу, оставляешь лежать или выкидываешь
    <span id="rcbtn" style="cursor:pointer;color:var(--accent);white-space:nowrap" onclick="recontext()" title="LLM пересоберёт весь стеллаж в контексты">· 🤖 пересобрать контексты</span>
    <span id="lsbtn" style="cursor:pointer;color:var(--accent);white-space:nowrap" onclick="toggleList()" title="все товары одним списком, с поиском">· 🔍 список</span></div>
  <div id="rcline" style="display:none;color:var(--dim);font-size:13px;margin-bottom:12px"></div>
  <div id="revbtn" style="display:none;background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent);
    padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:14px;cursor:pointer;text-align:center"></div>
  <div id="banner" onclick="location.href='/terminal'">⛔ Склад стоит: разбери инбокс →</div>
  <div id="stage"></div>
  <a href="/">← в прихожую склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
let items=[];
async function api(p,body){
  const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});
  if(r.status===423){$('#banner').style.display='block';throw new Error('blocked')}
  return r.json()
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function beep(f,d){try{const a=beep.ac=beep.ac||new AudioContext(),o=a.createOscillator(),g=a.createGain();
  o.type='triangle';o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(a.destination);
  o.start();g.gain.exponentialRampToValueAtTime(1e-4,a.currentTime+d);o.stop(a.currentTime+d)}catch(e){}}
function sideGlow(color,label){
  const el=document.createElement('div');el.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:1;display:block';
  el.style.background=`linear-gradient(90deg,${color}22 0%,transparent 20%,transparent 80%,${color}22 100%)`;
  const L=document.createElement('span');L.textContent='◀';L.style.cssText=`position:fixed;left:12px;top:50%;transform:translateY(-50%);font-size:28px;color:${color};opacity:.6`;
  const R=document.createElement('span');R.textContent='▶';R.style.cssText=`position:fixed;right:12px;top:50%;transform:translateY(-50%);font-size:28px;color:${color};opacity:.6`;
  el.appendChild(L);el.appendChild(R);document.body.appendChild(el);
  requestAnimationFrame(()=>{el.style.transition='opacity .5s ease,background .5s ease';
    el.style.background='transparent';el.style.opacity='0';
    setTimeout(()=>el.remove(),600);});
}
async function load(){
  items=await api('/boxes?shelf=rack');
  items.sort((a,b)=>(a.context||'я').localeCompare(b.context||'я')||a.id-b.id);
  render();
}
// автоконтекстуализация: контексты не вводятся руками - сервер сам пересобирает
// стеллаж (по затишью после триажа или по кнопке 🤖); тут только статус и опрос
async function recontext(){
  try{await api('/recontext',{})}catch(e){}
  pollRc(true);
}
async function pollRc(active){
  let st; try{st=await api('/recontext_status')}catch(e){return}
  const line=$('#rcline');
  if(st.running){
    line.style.display='block';line.textContent='🤖 пересобираю контексты…';
    setTimeout(()=>pollRc(active),4000);return}
  if(st.dirty){
    line.style.display='block';line.textContent='🤖 контексты пересоберутся после затишья';
    setTimeout(()=>pollRc(false),15000)}
  else if(st.last&&st.last.ok){
    line.style.display='block';
    line.textContent='🤖 контексты от '+st.last.at.slice(11,16)+': '+st.last.contexts.join(' · ')}
  else if(st.last&&!st.last.ok){
    line.style.display='block';line.textContent='🤖 не вышло: '+st.last.error}
  if(active)load(); // прогон закончился - показать свежую раскладку
}
// ── ревизия: конвейер по всему стеллажу, как разбор инбокса ──
// снапшот очереди (старейшие первыми), каждой коробке один вопрос:
// в фокус / пофиг (мусор) / оставить. За полный проход +⭐ (раз в день).
let rev=null; // {q:[], total, taken, trashed, kept}
async function loadRevStatus(){
  let st; try{st=await api('/rack_review_status')}catch(e){return}
  const b=$('#revbtn');
  if(mode!=='card'||!st.count){b.style.display='none';return}
  if(st.blocked){b.style.display='block';
    b.innerHTML='⛔ Склад стоит: разбери инбокс →';
    b.onclick=()=>location.href='/terminal';return}
  b.style.display='block';
  b.textContent=st.reward_ready
    ?`🧹 Ревизия стеллажа: ${st.count} коробок, старейшей ${st.oldest_days} дн. → +${st.reward}⭐`
    :`🧹 Ревизия сегодня уже была - но можно ещё раз`;
  b.onclick=startRev;
}
async function startRev(){
  try{focusN=((await api('/state')).counts||{}).focus||0}catch(e){focusN=0}
  rev={q:items.slice().sort((a,b)=>(a.entered_at||a.born_at).localeCompare(b.entered_at||b.born_at)),
       total:items.length,taken:0,trashed:0,kept:0};
  mode='rev';$('#revbtn').style.display='none';beep(500,.08);render();
}
let focusN=0;
function renderRev(){
  if(!rev.q.length)return finishRev();
  const done=rev.total-rev.q.length;
  window.WH_setLoadBar&&window.WH_setLoadBar(Math.round(done/rev.total*100),`ревизия: ${done} из ${rev.total}`);
  const b=rev.q[0];
  const age=Math.round((Date.now()-new Date(b.entered_at||b.born_at))/864e5);
  const warn=focusN>=5?`<div style="font-size:12.5px;color:var(--danger);margin-bottom:8px">⚠ фокус уже полон (${focusN}/5) - честнее «оставить» или «пофиг»</div>`:'';
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="ctx">${esc(b.context||'·')}</div>
    <div class="meta">ревизия · ${done+1} из ${rev.total} · #${b.id} · лежит ${age} дн.</div>
    <div class="task">${esc(b.raw_text)}</div>${warn}
    <button class="b-primary" onclick="revAct('focus')">1 🎯 В фокус</button>
    <button onclick="revKeep()">2 Оставить ›</button>
    <button class="b-danger" onclick="revAct('trash')">3 🗑 Пофиг</button>
  </div>`;
}
async function revAct(to){
  const b=rev.q[0];
  $('#c').classList.add('fly');beep(to==='trash'?180:560,.12);
  try{await api('/move',{id:b.id,to})}catch(e){$('#c').classList.remove('fly');render();return}
  if(to==='focus'){const btns=document.querySelectorAll('#stage button');focusWarn(btns[0]);}
  rev[to==='trash'?'trashed':'taken']++;
  if(to==='focus')focusN++;
  items=items.filter(x=>x.id!==b.id);
  rev.q.shift();setTimeout(render,280);
}
function revKeep(){
  $('#c').classList.add('flyl');beep(300,.06);
  rev.kept++;rev.q.shift();setTimeout(render,260);
}
async function finishRev(){
  let pts=0;
  try{pts=(await api('/rack_review_finish',{taken:rev.taken,trashed:rev.trashed,kept:rev.kept})).points||0}catch(e){}
  window.WH_setLoadBar&&window.WH_setLoadBar(100,'ревизия готова');
  beep(660,.1);setTimeout(()=>beep(880,.14),120);
  $('#stage').innerHTML=`<div class="card in" style="padding:40px 0">
    <div style="font-size:19px">🧹 Ревизия готова${pts?` · +${pts}⭐`:''}</div>
    <div class="meta" style="margin-top:10px">взял в фокус: ${rev.taken} · выкинул: ${rev.trashed} · лежат дальше: ${rev.kept}</div>
    ${pts?'':`<div class="meta" style="color:var(--danger);margin-top:6px">ни одного решения — без награды</div>`}
    <div style="margin-top:16px"><button class="b-ghost" onclick="rev=null;mode='card';load();loadRevStatus()">← к стеллажу</button></div>
  </div>`;
  rev=null;mode='done_rev';
}
function render(){
  $('#lsbtn').textContent=mode==='list'?'· 📦 по одному':'· 🔍 список';
  if(mode==='rev')return renderRev();
  if(mode==='done_rev')return;
  if(mode==='list')return renderList();
  if(!items.length){$('#stage').innerHTML='<div class="card muted">Стеллажи пусты. Всё либо в деле, либо сделано. ✨</div>';return}
  const b=items[0];
  const age=Math.round((Date.now()-new Date(b.entered_at||b.born_at))/864e5);
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="ctx">${esc(b.context||'🤖 контекст в пути')}</div>
    <div class="meta">#${b.id} · лежит ${age} дн. · на стеллажах ещё ${items.length}</div>
    <div class="task">${esc(b.raw_text)}</div>
    <button class="b-primary" onclick="act('focus')">1 🎯 В фокус</button>
    <button onclick="skip()">2 Лежит дальше ›</button>
    <button class="b-danger" onclick="act('trash')">3 🗑</button>
    <div style="margin-top:12px">
      <span id="mArr" style="cursor:pointer;color:var(--dim);font-size:12px" onclick="toggleMore()">▾ ещё</span>
      <div id="mRow" style="display:none;margin-top:8px">
        <button class="b-ghost" style="font-size:12.5px;padding:8px 12px" onclick="renameCur()">✏️ переименовать</button>
        <button class="b-ghost" style="font-size:12.5px;padding:8px 12px" onclick="streetCur()">${b.street?'🚶 уличная ✓ · убрать':'🚶 На улицу'}</button>
        <button class="b-ghost" style="font-size:12.5px;padding:8px 12px" title="жду человека/события — уйдёт в Ожидание, напомнит само" onclick="act('waiting')">⏳ Ожидание</button>
        <button class="b-ghost" style="font-size:12.5px;padding:8px 12px" title="слишком страшно/крупно — спрятать и вынести первый шаг" onclick="scaryCur()">😰 Страшно</button>
        <button class="b-ghost" style="font-size:12.5px;padding:8px 12px" title="разбить на 2+ отдельных задач без проекта" onclick="splitCur()">✂ Разбить</button>
      </div>
    </div>
  </div>`;
}
// режим списка: найти конкретный товар глазами или поиском, клик кладёт его
// первым в карточную очередь - все действия (фокус/переименовать/🗑) уже там
let mode='card';
function toggleList(){mode=mode==='list'?'card':'list';render();loadRevStatus()}
function renderList(){
  if(!items.length){$('#stage').innerHTML='<div class="card muted">Стеллажи пусты. Всё либо в деле, либо сделано. ✨</div>';return}
  $('#stage').innerHTML='<div class="in"><input id="q" placeholder="поиск по стеллажам…"><div id="rows"></div></div>';
  const q=$('#q');
  q.oninput=listRows;
  q.onkeydown=e=>{if(e.key==='Escape')toggleList()};
  listRows();q.focus();
}
function listRows(){
  const q=$('#q').value.trim().toLowerCase();
  const hit=items.filter(b=>!q||b.raw_text.toLowerCase().includes(q)||(b.context||'').toLowerCase().includes(q));
  $('#rows').innerHTML=hit.length?hit.map(b=>{
    const age=Math.round((Date.now()-new Date(b.entered_at||b.born_at))/864e5);
    return `<div class="row" onclick="pick(${b.id})" title="взять в руки">
      <span class="rctx">${esc(b.context||'·')}</span>
      <span>${esc(b.raw_text)}</span>
      <span class="rage">${age} дн.</span></div>`;
  }).join(''):'<div class="muted">ничего не нашлось</div>';
}
function pick(id){
  const i=items.findIndex(b=>b.id===id);if(i<0)return;
  items.unshift(items.splice(i,1)[0]);
  mode='card';beep(500,.06);render();
}
// свёрнутые редкие действия: переименовать / вручную в контекст улицы / в ожидание
// (ручной выбор сильнее LLM - пересборка стеллажа его уважает)
function toggleMore(){
  const r=$('#mRow'),open=r.style.display!=='none';
  r.style.display=open?'none':'block';
  $('#mArr').textContent=open?'▾ ещё':'▴ скрыть';
}
async function renameCur(){
  const b=items[0];if(!b)return;
  const t=prompt((window.WH_T||String)('Новое название:'),b.raw_text);
  if(!t||!t.trim()||t.trim()===b.raw_text)return;
  try{await api('/rename',{id:b.id,text:t.trim()});b.raw_text=t.trim();beep(500,.08);render()}catch(e){}
}
async function streetCur(){
  const b=items[0];if(!b)return;
  const v=b.street?0:1;
  try{await api('/street_mark',{id:b.id,street:v});
    b.street=v;if(v)b.context='🚶 Улица';else b.context=null;
    beep(v?620:300,.08);render()}catch(e){}
}
function skip(){
  sideGlow('var(--dim)','Лежит');
  const c=$('#c');c.classList.add('flyl');beep(300,.06);
  setTimeout(()=>{items.push(items.shift());render()},260);
}
// 😰 страшно: коробка со стеллажа прячется, вернётся сюда же после цепочки шагов
async function scaryCur(){
  const b=items[0];if(!b)return;
  try{await api('/scary',{id:b.id});beep(560,.12);items.shift();setTimeout(render,120)}catch(e){}
}
// ✂ разбить: части остаются на стеллаже (в том же контексте)
async function splitCur(){
  const b=items[0];if(!b)return;
  const raw=prompt('Разбить на задачи через «;» (минимум две):','');
  if(raw===null)return;
  const parts=raw.split(';').map(s=>s.trim()).filter(Boolean);
  if(parts.length<2){alert('нужно минимум две задачи');return}
  try{await api('/split',{id:b.id,parts});beep(600,.12);items.shift();setTimeout(render,120)}catch(e){}
}
async function act(to){
  const b=items[0];
  const col=to==='focus'?'var(--accent)':to==='trash'?'var(--danger)':'var(--dim)';
  sideGlow(col,to==='focus'?'🎯':to==='trash'?'🗑':'✅');
  $('#c').classList.add('fly');beep(to==='trash'?180:560,.12);
  try{await api('/move',{id:b.id,to})}catch(e){$('#c').classList.remove('fly');render();return}
  if(to==='focus')focusWarn();
  items.shift();
  setTimeout(render,280);
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(mode==='rev'){
    if(e.key==='1')revAct('focus'); if(e.key==='2')revKeep(); if(e.key==='3')revAct('trash');
    return}
  if(mode!=='card')return;
  if(e.key==='1')act('focus'); if(e.key==='2')skip(); if(e.key==='3')act('trash');
});
load().then(loadRevStatus);pollRc(false);
</script>
</body>
</html>
