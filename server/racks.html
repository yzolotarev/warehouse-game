<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>🗄 Стеллажи</title>
<style>
  :root{--bg:#1e1e24;--card:#2a2a32;--line:#44444e;--txt:#e8e8ee;--dim:#8a8a94;--sand:#d8b46e}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(640px,94vw);padding:22px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{font-size:17px;color:var(--sand);margin:0}
  #sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:26px;text-align:center}
  .task{font-size:21px;line-height:1.4;margin:10px 0 20px}
  .meta{font-size:12px;color:var(--dim)}
  .ctx{display:inline-block;background:#3e3a2e;border:1px solid #6e6448;border-radius:20px;
    padding:3px 12px;font-size:13px;color:var(--sand);margin-bottom:6px}
  button{font-size:16px;padding:13px 18px;border-radius:9px;border:1px solid var(--line);
    background:#2e2e38;color:var(--txt);cursor:pointer;margin:0 5px}
  button:hover{filter:brightness(1.25)}
  .b-focus{background:#2e4a5e;border-color:#4a7896}
  .b-trash{background:#4a2e2e;border-color:#8e4848}
  .muted{color:var(--dim);text-align:center;padding:40px 0;font-size:15px}
  .fly{animation:fly .4s ease forwards}
  @keyframes fly{to{transform:translateX(120%) rotate(5deg);opacity:0}}
  .flyl{animation:flyl .35s ease forwards}
  @keyframes flyl{to{transform:translateX(-120%) rotate(-4deg);opacity:0}}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  #banner{display:none;background:#4a2020;border:1px solid #a04040;color:#ffd0d0;
    padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:14px;cursor:pointer}
  a{color:var(--dim);font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
</style>
</head>
<body><div id="wrap">
  <h1>🗄 Отложенное <span style="color:var(--dim);font-weight:normal">= сделаю позже, не на этой неделе (стеллажи)</span></h1>
  <div id="sub">по одному товару: берёшь в работу, оставляешь лежать или выкидываешь</div>
  <div id="banner" onclick="location.href='/terminal'">⛔ Склад стоит: разбери инбокс →</div>
  <div id="stage"></div>
  <a href="/">← в прихожую склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
let items=[];
async function api(p,body){
  const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});
  if(r.status===423){$('#banner').style.display='block';throw new Error('blocked')}
  return r.json()
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function beep(f,d){try{const a=beep.ac=beep.ac||new AudioContext(),o=a.createOscillator(),g=a.createGain();
  o.type='triangle';o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(a.destination);
  o.start();g.gain.exponentialRampToValueAtTime(1e-4,a.currentTime+d);o.stop(a.currentTime+d)}catch(e){}}
async function load(){
  items=await api('/boxes?shelf=rack');
  items.sort((a,b)=>(a.context||'я').localeCompare(b.context||'я')||a.id-b.id);
  render();
}
function render(){
  if(!items.length){$('#stage').innerHTML='<div class="card muted">Стеллажи пусты. Всё либо в деле, либо сделано. ✨</div>';return}
  const b=items[0];
  const age=Math.round((Date.now()-new Date(b.born_at))/864e5);
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="ctx">${esc(b.context||'без контекста')}</div>
    <div class="meta">#${b.id} · лежит ${age} дн. · на стеллажах ещё ${items.length}</div>
    <div class="task">${esc(b.raw_text)}</div>
    <button class="b-focus" onclick="act('focus')">🎯 В фокус</button>
    <button onclick="skip()">Лежит дальше ›</button>
    <button class="b-trash" onclick="act('trash')">🗑</button>
  </div>`;
}
function skip(){
  const c=$('#c');c.classList.add('flyl');beep(300,.06);
  setTimeout(()=>{items.push(items.shift());render()},260);
}
async function act(to){
  const b=items[0];
  $('#c').classList.add('fly');beep(to==='trash'?180:560,.12);
  try{await api('/move',{id:b.id,to})}catch(e){return}
  items.shift();
  setTimeout(render,280);
}
document.addEventListener('keydown',e=>{
  if(e.key==='1')act('focus'); if(e.key==='2')skip(); if(e.key==='3')act('trash');
});
load();
</script>
</body>
</html>
