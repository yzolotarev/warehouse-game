<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="/assets/favicon.png">
<meta charset="utf-8">
<meta name="theme-color" content="#101014">
<meta name="color-scheme" content="dark light">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/welcome.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script><script src="/ambient.js"></script>
<title>💭 Мысли</title>
<style>
  
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(640px,94vw);padding:22px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{margin:0}
  #sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  .card{text-align:center}
  .task{font-size:20px;line-height:1.45;margin:10px 0 20px}
  .meta{font-size:12px;color:var(--dim)}
  button{margin:0 5px}
  #pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
  #cnt{color:var(--dim);font-size:13px}
  .muted{color:var(--dim);text-align:center;padding:40px 0;font-size:15px}
  .fly{animation:fly .45s ease forwards}
  @keyframes fly{to{transform:translateY(-90px);opacity:0}}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  a{font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
</style>
</head>
<body><div id="wrap">
  <h1>💭 Мысли <span style="color:var(--dim);font-weight:normal">= уже в Obsidian</span></h1>
  <div id="sub">каждая мысль с разбора автоматически стала заметкой в 2nd brain. Здесь — просто перечитай и убери с полки.</div>
  <div id="stage"></div>
  <div id="pager" style="display:none">
    <button class="b-ghost" onclick="pg(-1)">‹</button><span id="cnt"></span><button class="b-ghost" onclick="pg(1)">›</button>
  </div>
  <a href="/hub">← в меню склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
let items=[], i=0;
async function api(p){const r=await fetch(p);return r.json()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function beep(f,d){try{const a=beep.ac=beep.ac||new AudioContext(),o=a.createOscillator(),g=a.createGain();
  o.type='triangle';o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(a.destination);
  o.start();g.gain.exponentialRampToValueAtTime(1e-4,a.currentTime+d);o.stop(a.currentTime+d)}catch(e){}}
async function load(){
  items=await api('/boxes?shelf=mind');
  i=Math.min(i,Math.max(0,items.length-1)); render();
}
function render(){
  if(!items.length){$('#stage').innerHTML='<div class="card muted"><img class="empty-ill" src="/assets/empty-mind.png" alt="">Полка мыслей пуста. ✨ Мысль попадает сюда с разбора входящих: «Не дело → 💭 Мысль».</div>';
    $('#pager').style.display='none';return}
  const b=items[i];
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="meta">#${b.id} · записана ${b.born_at.slice(0,10)}</div>
    <div class="task">${esc(b.raw_text)}</div>
    <button class="b-sec" onclick="taken(${b.id})">✅ Ок → в архив</button>
    <button class="b-danger" onclick="toTrash(${b.id})">🗑 Уже не нужна</button>
    <div class="meta" style="margin-top:12px">заметка уже создана в Obsidian — кнопки убирают мысль только с этой полки</div>
  </div>`;
  $('#pager').style.display=items.length>1?'flex':'none';
  $('#cnt').textContent=(i+1)+' / '+items.length;
}
function pg(d){i=(i+d+items.length)%items.length;render()}
async function mv(id,to){
  const r=await fetch('/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,to})});
  if(r.status===423){$('#stage').insertAdjacentHTML('afterbegin',
    '<div class="card" style="border-color:var(--danger);color:var(--danger);margin-bottom:12px;cursor:pointer" onclick="location.href=\'/terminal\'">⛔ Склад стоит: разбери входящие →</div>');
    throw new Error('blocked')}
  return r.json()
}
async function taken(id){
  $('#c').classList.add('fly');beep(700,.15);
  try{await mv(id,'archived')}catch(e){return}
  setTimeout(load,350);
}
async function toTrash(id){
  $('#c').classList.add('fly');beep(180,.12);
  try{await mv(id,'trash')}catch(e){return}
  setTimeout(load,350);
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowLeft')pg(-1); if(e.key==='ArrowRight')pg(1);
  const btns=document.querySelectorAll('#stage .card button'),n=parseInt(e.key,10);
  if(n>=1&&n<=btns.length)btns[n-1].click();
});
load();
</script>
</body>
</html>
