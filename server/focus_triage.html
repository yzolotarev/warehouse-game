<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script><script src="/juice.js"></script>
<title>✂ Разбор фокуса</title>
<style>
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(640px,94vw);padding:22px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{margin:0}
  #sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  #stage{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:22px;text-align:center}
  .task{font-size:19px;line-height:1.4;margin:8px 0 18px;max-height:34vh;overflow-y:auto;white-space:pre-wrap}
  .meta{font-size:12px;color:var(--dim)}
  button{margin:4px 6px}
  .muted{color:var(--dim);text-align:center;padding:40px 0;font-size:15px}
  .in{animation:inup .25s ease}
  @keyframes inup{from{transform:translateY(14px);opacity:0}}
  a{font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
  #cnt{text-align:center;color:var(--dim);font-size:13px;margin-top:12px}
</style>
</head>
<body><div id="wrap">
  <h1>✂ Разбор фокуса</h1>
  <div id="sub">проход 1: что может робот - уезжает к нему · проход 2: судьба остальных</div>
  <div id="stage"></div>
  <div id="cnt"></div>
  <a href="/">← в прихожую склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
async function api(p,body){const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});if(!r.ok)throw new Error((await r.json()).detail||r.status);return r.json()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
const HOME={pallet_step:'🧱 обратно в проект',rack:'🗄 на стеллаж',waiting:'⏳ в ожидание'};
let items=[],trimAt=5,keptN=0;
async function load(){
  const d=await api('/focus_triage');
  items=d.items;trimAt=d.trim_at;keptN=0;render();
}
function render(){
  const total=keptN+items.length;
  if(!items.length){
    $('#stage').innerHTML=`<div class="muted">Разбор пройден. ✨<br><br>
      В фокусе осталось: ${keptN}${keptN>trimAt?' - всё ещё толще канона, можно пройтись ещё раз':' 👍'}</div>`;
    $('#cnt').textContent='';return;
  }
  // бетчинг, как в терминале: один вопрос по ВСЕЙ пачке, потом следующий.
  // Проход 1 - разметка для робота (только неразмеченные), проход 2 - судьба
  const tagQ=items.filter(x=>x.ai_ok===null||x.ai_ok===undefined);
  const tagPhase=tagQ.length>0;
  const b=tagPhase?tagQ[0]:items[0];
  const pal=b.pallet_title?` · 🧱 ${esc(b.pallet_title)}`:'';
  const dust=b.idle_days>3?` · <span style="color:var(--sand)">🕸 лежит ${b.idle_days} дн.</span>`:'';
  const btns=tagPhase
    ?`<div class="meta" style="margin-bottom:8px">проход 1 · может ли это сделать ИИ? (осталось ${tagQ.length})</div>
      <button class="b-primary" onclick="tag(true)">🤖 Робот</button>
      <button class="b-sec" onclick="tag(false)">🙅 Не робот</button>`
    :`<button class="b-ok" onclick="done()">✅ Сделал</button>
      <button class="b-sec" onclick="keep()">🎯 Остаётся в фокусе</button>
      <button class="b-sec" onclick="back()">↩ ${HOME[b.origin]||HOME.rack}</button>
      <button class="b-danger" title="уже неактуально" onclick="toTrash()">🗑</button>`;
  $('#stage').innerHTML=`<div class="card in">
    <div class="meta">${b.starred?'⭐ ':''}${b.ai_ok===1?'🤖 ':''}#${b.id}${pal}${dust} · родилась ${b.born_at.slice(0,10)}</div>
    <div class="task">${esc(b.raw_text)}</div>
    ${btns}
  </div>`;
  $('#cnt').textContent=tagPhase
    ?`проход 1 из 2 · потом судьба всех ${items.length}`
    :`осталось решить ${items.length} · в фокусе останется ~${keptN}+`;
}
async function tag(ok){
  const b=items.find(x=>x.ai_ok===null||x.ai_ok===undefined);
  try{await api('/robot_mark',{id:b.id,ok})}
  catch(e){alert('не отметилось: '+e.message);return}
  if(ok)items.splice(items.indexOf(b),1); // «Робот» = уехала в ящик робота
  else b.ai_ok=0;
  if(!items.some(x=>x.ai_ok===null||x.ai_ok===undefined)&&window.juiceWin)
    juiceWin('Фокус протегирован!'); // проход 1 закрыт - переходим к судьбам
  render();
}
function keep(){keptN++;items.shift();render()}
async function move(to){
  const b=items[0];
  try{await api('/move',{id:b.id,to})}
  catch(e){alert('не уехала: '+e.message);return}
  items.shift();render();
}
function done(){move('done');window.juice&&juice('done')}
function back(){move(items[0].origin)}
function toTrash(){move('trash')}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||!items.length)return;
  if(items.some(x=>x.ai_ok===null||x.ai_ok===undefined)){ // проход 1
    if(e.key==='1')tag(true);
    if(e.key==='2')tag(false);
    return}
  if(e.key==='1')done();
  if(e.key==='2')keep();
  if(e.key==='3')back();
  if(e.key==='4')toTrash();
});
load();
</script>
</body>
</html>
