<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="/assets/favicon.png">
<meta charset="utf-8">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/welcome.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script><script src="/ambient.js"></script><script src="/juice.js"></script>
<title>🤖 Разбор для робота</title>
<style>
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(640px,94vw);padding:22px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{margin:0}
  #sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  #stage{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:22px;text-align:center}
  .task{font-size:19px;line-height:1.4;margin:8px 0 18px;max-height:38vh;overflow-y:auto;white-space:pre-wrap}
  .meta{font-size:12px;color:var(--dim)}
  button{margin:4px 6px}
  .muted{color:var(--dim);text-align:center;padding:40px 0;font-size:15px}
  .in{animation:inup .25s ease}
  @keyframes inup{from{transform:translateY(14px);opacity:0}}
  a{font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
  #cnt{text-align:center;color:var(--dim);font-size:13px;margin-top:12px}
</style>
</head>
<body><div id="wrap">
  <h1>🤖 Разбор для робота</h1>
  <div id="sub">Робот = ИИ может сделать это целиком из компьютера · Не робот = нужен ты сам</div>
  <div id="stage"></div>
  <div id="cnt"></div>
  <a href="/">← в прихожую склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
async function api(p,body){const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});return r.json()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
const SHELF={focus:'🎯 фокус',rack:'🗄 стеллаж',pallet_step:'🧱 шаг проекта',waiting:'⏳ ожидание'};
let items=[],markedNow=0,marked0=0,hist=[];
async function load(){
  const d=await api('/robot_triage');
  items=d.items;marked0=d.marked;markedNow=0;hist=[];render();
}
function render(){
  if(!items.length){
    $('#stage').innerHTML=`<div class="muted">Всё размечено. ✨<br><br>
      ${markedNow?`За этот проход: ${markedNow}.<br>`:''}
      Новые коробки появятся здесь сами, как только родятся.</div>`;
    $('#cnt').textContent='';return;
  }
  const b=items[0];
  const ctx=b.context?` · ${esc(b.context)}`:'';
  $('#stage').innerHTML=`<div class="card in">
    <div class="meta">#${b.id} · ${SHELF[b.shelf]||esc(b.shelf)}${ctx} · родилась ${b.born_at.slice(0,10)}</div>
    <div class="task">${esc(b.raw_text)}</div>
    <button class="b-primary" onclick="mark(true)">🤖 Робот</button>
    <button class="b-sec" onclick="mark(false)">🙅 Не робот</button>
    <button class="b-ghost" title="пропустить, решу позже" onclick="skip()">⤵ позже</button>
    ${hist.length?'<button class="b-ghost" title="Backspace" onclick="undo()">↩ шаг назад</button>':''}
  </div>`;
  $('#cnt').textContent=`осталось ${items.length}`+(hist.length?' · ↩ Backspace':'');
}
async function mark(ok){
  const b=items.shift();markedNow++;hist.push(b);
  api('/robot_mark',{id:b.id,ok});
  // фокус едет первым; протегирован последний фокусный → маленькая победа
  if(b.shelf==='focus'&&!items.some(x=>x.shelf==='focus')&&window.juiceWin)
    juiceWin('Фокус протегирован!');
  render();
}
function undo(){
  const b=hist.pop();
  if(!b)return;
  markedNow=Math.max(0,markedNow-1);
  api('/robot_unmark',{id:b.id});
  items.unshift(b);render();
}
function skip(){items.push(items.shift());render()}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Backspace'){e.preventDefault();undo();return}
  if(!items.length)return;
  if(e.key==='1')mark(true);
  if(e.key==='2')mark(false);
  if(e.key==='3')skip();
});
load();
</script>
</body>
</html>
