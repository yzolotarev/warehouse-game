<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="/assets/favicon.png">
<meta charset="utf-8">
<meta name="theme-color" content="#101014">
<meta name="color-scheme" content="dark light">
<title>📦 Склад</title>
<!-- Оболочка непрерывного фона (21.07): амбиенс живёт ЗДЕСЬ, в родителе,
     а весь склад крутится во вложенном iframe. Переходы между страницами
     перезагружают только iframe - видео и звук НЕ прерываются вообще.
     ambient.js в родителе рисует слой+кнопку; на вложенных страницах он
     видит iframe-режим и лишь делает их фон прозрачным. -->
<style>
  html,body{margin:0;height:100%;background:#101014}
  #wh{position:fixed;inset:0;border:0;width:100%;height:100%;z-index:1;background:transparent}
</style>
<script src="/ambient.js"></script>
</head>
<body>
<iframe id="wh" src="/hub" allowtransparency="true"></iframe>
</body>
</html>
