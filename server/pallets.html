<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="/assets/favicon.png">
<meta charset="utf-8">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script><script src="/juice.js"></script>
<title>🧱 Паллетная зона</title>
<style>
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(680px,94vw);padding:24px 0;display:flex;flex-direction:column;height:100%;box-sizing:border-box}
  h1{margin:0}
  #sub{margin-bottom:18px}
  .raw{font-size:19px;font-weight:500;line-height:27px;margin-bottom:14px}
  input{width:100%;box-sizing:border-box;margin-bottom:10px}
  label{font-size:12.5px;color:var(--dim)}
  .ptitle{font-size:20px;font-weight:600;line-height:27px}
  .crit{font-size:13px;color:var(--dim);margin:6px 0 12px}
  .step{font-size:15px;line-height:22px;padding:3px 0}
  .step.done{opacity:.5;text-decoration:line-through}
  .wbtn{cursor:pointer;opacity:.3;margin-left:8px}
  .step:hover .wbtn{opacity:1}
  .muted{color:var(--dim);font-size:14px;text-align:center;padding:30px 0}
  #pager{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px}
  #cnt{color:var(--dim);font-size:13px}
  .fly{animation:fly .4s ease forwards}
  @keyframes fly{to{transform:translateX(120%) rotate(5deg);opacity:0}}
  .flyl{animation:flyl .35s ease forwards}
  @keyframes flyl{to{transform:translateX(-120%) rotate(-4deg);opacity:0}}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  .inl{animation:inl .3s ease}
  @keyframes inl{from{transform:translateX(40px);opacity:0}}
  .inr{animation:inr .3s ease}
  @keyframes inr{from{transform:translateX(-40px);opacity:0}}
</style>
</head>
<body><div id="wrap">
  <h1>🧱 Проекты <span style="color:var(--dim);font-weight:normal">= дела в несколько шагов (паллетная зона)</span></h1>
  <div id="sub">здесь проект получает цель («готово, когда...») и следующий конкретный шаг. Шаг уходит в Фокус - список «делаю сейчас».</div>
  <div id="stage"></div>
  <div id="pager" style="display:none">
    <button class="b-ghost" onclick="pg(-1)">‹</button><span id="cnt"></span><button class="b-ghost" onclick="pg(1)">›</button>
  </div>
  <div id="sideglow" style="display:none;position:fixed;inset:0;pointer-events:none;z-index:1"></div>
</div>
<script>
"use strict";
window.WH_LOADBAR_OWNED=true; // нижняя шкала здесь = прогресс шагов текущего проекта, не часы дня
const $=s=>document.querySelector(s);
let unformed=[], pallets=[], frozen=[], seriesPts=2, pi=0;
let rev=null, focusN=0; // ревью очереди проекта — тот же конвейер, что ревизия стеллажа
function loadBar(nDone,nSteps,title){
  if(!window.WH_setLoadBar)return;
  if(nSteps===undefined){window.WH_setLoadBar(0,'нет открытого проекта');return}
  const p=nSteps?Math.round(nDone/nSteps*100):0;
  window.WH_setLoadBar(p,title+`: ${nDone}/${nSteps} шагов`);
}
async function api(p,body){
  const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});
  if(r.status===423){alert((window.WH_T||String)('⛔ Склад стоит: сначала разбери инбокс (/terminal)'));throw new Error('blocked')}
  return r.json()
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function load(){
  const d=await api('/pallets');
  unformed=d.unformed; pallets=d.pallets; frozen=d.frozen||[]; seriesPts=d.series_points||2;
  // deep-link из тяги («🥛 подоить проект N») → открыть сразу нужную паллету
  const m=location.hash.match(/^#p(\d+)/);
  if(m){const idx=pallets.findIndex(p=>String(p.id)===m[1]); if(idx>=0)pi=idx;
    history.replaceState(null,'','/pallets_page');}
  pi=Math.min(pi,Math.max(0,pallets.length+frozen.length-1));
  render();
}
let inCls='in';
let mode='list'; // list = проекты; form = оформление новых
// Оформление - по одному вопросу (как терминал): минимальная окрестность
// внимания, Enter = дальше. formVals копит ответы, пока идём по FORM_STEPS.
const FORM_STEPS=[
  {key:'t', label:'Название проекта', ph:''},
  {key:'cr', label:'Готово, когда...', ph:'конкретный образ результата'},
  {key:'st', label:'Первый шаг — маленький и конкретный', ph:'настолько простой, что не о чем думать'}
];
let formStep=0, formVals={}, formItemId=null;
function render(){
  $('#pager').style.display='none';
  if(mode==='rev')return renderRev();
  const total=pallets.length+frozen.length;
  if(mode==='form'&&!unformed.length)mode='list';
  if(!total&&unformed.length)mode='form'; // проектов нет вообще - сразу оформление
  if(mode==='form'){
    loadBar();
    const b=unformed[0];
    if(formItemId!==b.id){ // новый товар на оформление - сброс шагов
      formItemId=b.id; formStep=0; formVals={t:b.raw_text.slice(0,60), cr:'', st:''};
    }
    const step=FORM_STEPS[formStep];
    $('#stage').innerHTML=`<div class="card ${inCls}" id="c">
      <div style="color:var(--dim);font-size:12px;margin-bottom:6px">новых проектов на оформление: ${unformed.length} · шаг ${formStep+1}/${FORM_STEPS.length}</div>
      <div class="raw">🌫 ${esc(b.raw_text)}</div>
      <label>${step.label}</label>
      <input id="fsInput" placeholder="${step.ph}" value="${esc(formVals[step.key]||'')}"
        onkeydown="if(event.key==='Enter')formStepNext()">
      <div style="display:flex;gap:10px;margin-top:10px">
        <button class="b-primary" onclick="formStepNext()">${formStep<FORM_STEPS.length-1?'Дальше →':'Оформить'}</button>
        ${formStep>0?'<button class="b-ghost" onclick="formStepBack()">‹ назад</button>':''}
        <button class="b-ghost" onclick="skip()">Позже ›</button>
        <button class="b-danger" title="передумал — проекта не будет" onclick="trashUnformed(${b.id})">🗑 Не нужен</button>
      </div>
      <div class="meta" style="margin-top:12px;cursor:pointer" onclick="mode='list';render()">‹ к проектам (оформлю позже)</div>
    </div>`;
    const inp=$('#fsInput'); inp.focus(); inp.select();
    return;
  }
  const banner=unformed.length
    ?`<div class="card" style="padding:12px 18px;margin-bottom:12px;cursor:pointer;border-color:var(--accent)"
        onclick="mode='form';render()">🌫 Новых проектов на оформление: <b>${unformed.length}</b> →</div>`:'';
  if(!total){loadBar();$('#stage').innerHTML='<div class="card muted"><img class="empty-ill" src="/assets/empty-pallets.png" alt="">Проектов нет. ✨ Проект рождается на разборе входящих: ответ «🧱 Проект» приводит его сюда.</div>';return}
  if(pi>=pallets.length){renderFrozen(frozen[pi-pallets.length],total);return}
  const p=pallets[pi];
  // сегменты шагов: очередь (заряжено, ждёт фокуса) · в работе · ждунские · история
  const queue=p.steps.filter(s=>s.shelf==='pallet_step');
  const inFocus=p.steps.filter(s=>s.shelf==='focus');
  const waitSteps=p.steps.filter(s=>s.shelf==='waiting');
  const hist=p.steps.filter(s=>['done','archived'].includes(s.shelf));
  const steps=(hist.map(s=>`<div class="step done">✅ ${esc(s.raw_text)}</div>`).join('')
    +waitSteps.map(s=>`<div class="step">⏳ ${esc(s.raw_text)}</div>`).join(''))
    ||'<div class="muted">пока пусто</div>';
  // авто-«что было»: последний сделанный шаг из moves — рисуется сам, журнал не веду
  const whatLine=p.last_done
    ?`<div class="meta" style="margin-top:6px">последнее: «${esc(p.last_done.text)}» · ${p.last_done.days===0?'сегодня':p.last_done.days+'д назад'}</div>`:'';
  // крошка «на чём встал» — опциональная, чаще пустая; для возврата на плохую голову
  const crumbLine=p.breadcrumb
    ?`<div class="meta" style="margin-top:4px;color:var(--sand)">🔖 встал на: ${esc(p.breadcrumb)} <span class="wbtn" style="opacity:.5" onclick="editCrumb(${p.id})">✏️</span></div>`
    :`<div class="meta" style="margin-top:4px;opacity:.55;cursor:pointer" onclick="editCrumb(${p.id})">+ 🔖 пометка «на чём встал»</div>`;
  const focusBlock=inFocus.length
    ?`<div class="crit" style="color:var(--vio);margin-top:10px">🎯 в работе: ${inFocus.map(s=>esc(s.raw_text)).join(' · ')}</div>`:'';
  // СЛЕДУЮЩИЙ ШАГ = голова очереди; пусто и ничего в работе → проект встал, зови доение
  const revBtn=queue.length>=2
    ?`<span class="wbtn" style="opacity:1;color:var(--accent);cursor:pointer;font-size:12.5px;font-weight:normal"
        onclick="startRev(${p.id})" title="пройтись по очереди по одной: в фокус / оставить / пофиг">🧹 ревью очереди (${queue.length})</span>`:'';
  const nextBlock=queue.length
    ?`<div class="crit" style="color:var(--accent);font-weight:600;margin-top:10px;display:flex;justify-content:space-between;align-items:baseline">
        <span>СЛЕДУЮЩИЙ ШАГ:</span>${revBtn}</div>`
      +queue.map(s=>`<div class="step">🔹 ${esc(s.raw_text)}
        <span class="wbtn" title="взять в фокус — делать сейчас" onclick="stepFocus(${s.id})">🎯</span>
        <span class="wbtn" title="жду ответа/события — в Ожидание" onclick="stepWait(${s.id})">⏳</span></div>`).join('')
    :(inFocus.length?'':`<div class="crit" style="color:var(--sand);margin-top:10px">🥛 очередь пуста — задай следующий шаг, иначе проект встанет</div>`);
  const idle=p.idle_days>7?`<div class="crit" style="color:var(--sand)">🕸 без движения ${p.idle_days} дн. (месяц — и уедет в морозилку)</div>`:'';
  const series=p.done_today?`<div class="crit" style="color:var(--vio)">🔥 серия: сегодня по этой паллете уже сделано ${p.done_today} — следующий шаг даст +${seriesPts} сверху</div>`:
    `<div class="crit">💡 второй шаг этой паллеты за день пойдёт серией: +${seriesPts} к очкам</div>`;
  const nSteps=p.steps.length, nDone=p.steps.filter(s=>['done','archived'].includes(s.shelf)).length;
  loadBar(nDone,nSteps,p.title);
  const seriesHint=p.done_today
    ?`<div class="meta" style="color:var(--vio);margin-top:8px">🔥 серия: сегодня уже ${p.done_today} — следующий шаг +${seriesPts} сверху</div>`
    :`<div class="meta" style="margin-top:8px">💡 второй шаг за день пойдёт серией: +${seriesPts}</div>`;
  $('#stage').innerHTML=banner+`<div class="card ${inCls}">
    <div class="ptitle">${esc(p.title)}</div>
    ${idle}
    ${whatLine}
    ${crumbLine}
    ${focusBlock}
    ${nextBlock}
    <div style="display:flex;gap:8px;margin-top:14px">
      <input id="ns" placeholder="следующий шаг — маленький и конкретный" style="margin:0">
      <button class="b-primary" style="white-space:nowrap" title="в очередь проекта — заряженный следующий шаг (потом 🎯 в фокус)" onclick="addStep(${p.id})">＋ в очередь</button>
      <button class="b-ghost" style="white-space:nowrap" title="ждунческий шаг: письмо, ответ, событие — сразу в Ожидание, напомнит само" onclick="addStepWait(${p.id})">→ ⏳</button>
    </div>
    ${seriesHint}
    <details class="drawer" style="margin-top:14px">
      <summary>Цель и шаги (${nDone}/${nSteps})</summary>
      <div class="drawer-body">
        <div id="purposewrap">${(p.purpose||p.principles)?`
          <div class="crit">Зачем: ${esc(p.purpose||'—')}</div>
          <div class="crit">Правила: ${esc(p.principles||'—')} <span class="wbtn" style="opacity:.5" onclick="editPurpose(${p.id})">✏️</span></div>
        `:`<div class="meta" style="cursor:pointer" onclick="editPurpose(${p.id})">+ зачем и по каким правилам (необязательно)</div>`}</div>
        <div class="crit">Готово, когда: ${esc(p.done_criteria||'—')}</div>
        ${steps}
      </div>
    </details>
    <details class="drawer" ontoggle="if(this.open)noteLoad(${p.id})">
      <summary>Заметка проекта${p.note_path?'':' · нет'}</summary>
      <div class="drawer-body">
        <div id="notefiles" class="meta" style="margin-bottom:6px"></div>
        <textarea id="notebody" spellcheck="false" oninput="noteDirty()" style="width:100%;box-sizing:border-box;height:240px;
          resize:vertical;font-size:13px;line-height:1.5;white-space:pre-wrap"></textarea>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
          <button id="notesave" class="b-sec" style="display:none" onclick="noteSave(${p.id})">💾 Сохранить в Obsidian</button>
          <span id="notestat" class="meta">правь прямо здесь · перед записью делается бэкап</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="na" placeholder="или быстро дописать строку в конец" style="margin:0">
          <button class="b-ghost" onclick="noteAppend(${p.id})">＋</button>
        </div>
        <div id="attachwrap" style="margin-top:8px">${p.note_path?'':'<button class="b-ghost" onclick="showAttach('+p.id+')">📎 привязать существующий файл</button>'}</div>
      </div>
    </details>
    <details class="drawer">
      <summary>Управление</summary>
      <div class="drawer-body">
        <button class="b-ghost" onclick="bump(${p.id})" title="клавиша P">📌 На первое место</button>
        <button class="b-ghost" onclick="freeze(${p.id},true)">🧊 Заморозить проект</button>
        <button class="b-ghost" title="творческие шаги не дают 🎬-минут: интерес — сам себе награда"
          onclick="setCreative(${p.id},${p.creative?'false':'true'})">${p.creative?'🎨 творческий ✓ (без 🎬)':'🎨 сделать творческим'}</button>
        <button class="b-danger" onclick="delPallet(${p.id})">🗑 Не нужен</button>
      </div>
    </details>
  </div>`;
  $('#pager').style.display='flex';
  $('#cnt').textContent=`паллета ${pi+1} / ${total} · P = наверх`;
}
function renderFrozen(p,total){
  const nSteps=p.steps.length, nDone=p.steps.filter(s=>['done','archived'].includes(s.shelf)).length;
  loadBar(nDone,nSteps,p.title+' (🧊)');
  $('#stage').innerHTML=`<div class="card ${inCls}" style="opacity:.75">
    <div class="ptitle">🧊 ${esc(p.title)} <span style="font-size:12px;color:var(--dim)">заморожена</span></div>
    <div class="crit">Готово, когда: ${esc(p.done_criteria||'—')}</div>
    <div class="muted" style="padding:10px 0">спит. Разморозка — только руками.</div>
    <button class="b-sec" onclick="freeze(${p.id},false)">▶️ Разморозить</button>
    <button class="b-danger" onclick="delPallet(${p.id})">🗑 Не нужен</button>
  </div>`;
  $('#pager').style.display='flex';
  $('#cnt').textContent=`паллета ${pi+1} / ${total} · морозилка`;
}
async function freeze(id,fr){
  await api('/pallet/freeze',{id,frozen:fr});
  beep(fr?240:600,.12); load();
}
function editPurpose(pid){
  const p=curPallet(); if(!p)return;
  $('#purposewrap').innerHTML=`
    <label>Зачем это вообще</label><input id="pped" value="${esc(p.purpose||'')}" placeholder="чем мерить решения по ходу">
    <label>По каким правилам</label><input id="pred" value="${esc(p.principles||'')}" placeholder="я бы дал кому угодно полную свободу это делать, при условии что...">
    <button class="b-sec" style="margin-top:6px" onclick="savePurpose(${pid})">💾 Сохранить</button>`;
}
async function savePurpose(pid){
  await api('/pallet/purpose',{id:pid,purpose:$('#pped').value.trim(),principles:$('#pred').value.trim()});
  beep(620,.1); load();
}
async function setCreative(id,cr){
  await api('/pallet/creative',{id,creative:cr});
  beep(cr?820:340,.12); load();
}
async function delPallet(id){
  if(!confirm((window.WH_T||String)('Удалить проект? Несделанные шаги уедут в мусор.')))return;
  const r=await api('/pallet/delete',{id});
  beep(180,.15); pi=0; load();
}
function pg(d){const n=pallets.length+frozen.length;pi=(pi+d+n)%n;inCls=d>0?'inl':'inr';render();inCls='in'}
function skip(){
  const c=$('#c');c.classList.add('flyl');
  setTimeout(()=>{unformed.push(unformed.shift());render()},280);
}
let noteHash=null;
const BRAINSTORM_TPL="## Куски (брейншторм)\nвытряхнуть всё, что вообще нужно для готовности - без порядка\n\n## Порядок\nчто из брейншторма идёт первым, что зависит от чего\n\n## Внешние зависимости\nчей вход нужен, было ли похожее раньше";
async function noteLoad(pid){
  const d=await api('/pallet_note?id='+pid);
  $('#notebody').value=d.content||'';
  $('#notebody').placeholder=d.content?'':BRAINSTORM_TPL;
  noteHash=d.hash;
  $('#notefiles').textContent=d.files.length?('📁 в папке проекта: '+d.files.join(' · ')):'';
  $('#notesave').style.display='none';
  $('#notestat').textContent='правь прямо здесь · перед записью делается бэкап';
}
function noteDirty(){$('#notesave').style.display='inline-block';
  $('#notestat').textContent='есть несохранённые правки';}
async function noteSave(pid){
  const r=await fetch('/pallet/note_save',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:pid,content:$('#notebody').value,base_hash:noteHash})});
  if(r.status===409){
    $('#notestat').textContent='⚠ файл параллельно изменён в Obsidian — скопируй правки, закрой и открой заметку заново';
    beep(180,.15);return}
  const d=await r.json(); noteHash=d.hash;
  $('#notesave').style.display='none';
  $('#notestat').textContent='💾 сохранено '+new Date().toLocaleTimeString().slice(0,5);
  beep(620,.1);
}
async function noteAppend(pid){
  const v=$('#na').value.trim(); if(!v)return;
  await api('/pallet/note_append',{id:pid,text:v});
  $('#na').value=''; beep(620,.1);
  const d=await api('/pallet_note?id='+pid);
  if($('#notebody')){$('#notebody').value=d.content||''; noteHash=d.hash;}
}
async function showAttach(pid){
  const files=await api('/obsidian_files');
  const opts=files.map(f=>`<option value="${f.path.replace(/"/g,'&quot;')}">${f.name}</option>`).join('');
  $('#attachwrap').innerHTML=files.length
    ?`<div style="display:flex;gap:8px">
        <select id="af" style="flex:1">${opts}</select>
        <button class="b-sec" onclick="doAttach(${pid})">📎 Привязать</button>
      </div>`
    :'<div class="meta">папка проектов Obsidian пуста или недоступна · допиши строку выше — файл создастся сам</div>';
}
async function doAttach(pid){
  await api('/pallet/note_attach',{id:pid,path:$('#af').value});
  beep(560,.1); load();
}
async function trashUnformed(id){
  // несформированный проект = обычный товар на полке pallet_step: в мусор через /move
  $('#c').classList.add('fly');
  beep(180,.12);
  await api('/move',{id,to:'trash'});
  setTimeout(()=>{if(unformed.length<=1)mode='list';load()},280);
}
function formStepNext(){
  const v=$('#fsInput').value;
  formVals[FORM_STEPS[formStep].key]=v;
  if(formStep===0&&!v.trim())return; // название обязательно, дальше не пускаем
  if(formStep<FORM_STEPS.length-1){formStep++;render();return}
  submitForm(unformed[0].id);
}
function formStepBack(){
  formVals[FORM_STEPS[formStep].key]=$('#fsInput').value;
  formStep--;render();
}
async function submitForm(id){
  const title=(formVals.t||'').trim();
  if(!title)return;
  $('#c').classList.add('fly');
  beep(560,.12);
  await api('/pallet',{title,done_criteria:(formVals.cr||'').trim(),from_box:id,first_step:(formVals.st||'').trim()});
  formItemId=null; // сброс - следующий товар начнёт оформление с шага 1
  setTimeout(()=>{if(unformed.length<=1)mode='list';load()},280);
}
function beep(f,d){try{const a=beep.ac=beep.ac||new AudioContext(),o=a.createOscillator(),g=a.createGain();
  o.type='triangle';o.frequency.value=f;g.gain.value=.04;o.connect(g);g.connect(a.destination);
  o.start();g.gain.exponentialRampToValueAtTime(1e-4,a.currentTime+d);o.stop(a.currentTime+d)}catch(e){}}
function sideGlow(color,label){
  const el=$('#sideglow');el.style.display='block';el.style.transition='none';
  el.style.background=`linear-gradient(90deg,${color}22 0%,transparent 20%,transparent 80%,${color}22 100%)`;
  el.textContent='';
  const L=document.createElement('span');L.textContent='◀';L.style.cssText=`position:fixed;left:12px;top:50%;transform:translateY(-50%);font-size:28px;color:${color};opacity:.6`;
  const R=document.createElement('span');R.textContent='▶';R.style.cssText=`position:fixed;right:12px;top:50%;transform:translateY(-50%);font-size:28px;color:${color};opacity:.6`;
  el.appendChild(L);el.appendChild(R);
  requestAnimationFrame(()=>{el.style.transition='opacity .5s ease,background .5s ease';
    el.style.background='transparent';el.style.opacity='0';
    setTimeout(()=>{el.style.display='none';el.style.opacity='1';el.innerHTML=''},600);});
  const m=$('div[class*="meta"]');if(m&&m.textContent.includes('ревью')){const old=m.textContent;m.textContent=label+' · '+old;
    setTimeout(()=>{if(m.textContent.includes(label))m.textContent=old},700);}
}
async function addStep(pid){
  const v=$('#ns').value.trim(); if(!v)return;
  await api('/pallet/step',{pallet_id:pid,text:v});
  window.juice&&juice('milk');
  load();
}
async function stepFocus(id){
  // тянем заряженный шаг из очереди проекта в фокус — «делаю сейчас»
  try{await api('/move',{id,to:'focus'})}catch(e){return}
  focusWarn();
  beep(560,.1);window.juice&&juice('focus');load();
}
// ── ревью очереди проекта: тот же конвейер, что ревизия стеллажа, но по
// шагам конкретного проекта — «в фокус / оставить / пофиг» по одному ──
async function startRev(pid){
  try{focusN=((await api('/state')).counts||{}).focus||0}catch(e){focusN=0}
  const p=(pallets.find(x=>x.id===pid));
  const q=p.steps.filter(s=>s.shelf==='pallet_step');
  rev={pid,title:p.title,q,total:q.length,taken:0,trashed:0,kept:0};
  mode='rev';beep(500,.08);render();
}
function renderRev(){
  if(!rev.q.length)return finishRev();
  const done=rev.total-rev.q.length;
  window.WH_setLoadBar&&window.WH_setLoadBar(Math.round(done/rev.total*100),`ревью «${rev.title}»: ${done} из ${rev.total}`);
  const b=rev.q[0];
  const warn=focusN>=5?`<div style="font-size:12.5px;color:var(--danger);margin-bottom:8px">⚠ фокус уже полон (${focusN}/5) - честнее «оставить» или «пофиг»</div>`:'';
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="meta">ревью «${esc(rev.title)}» · ${done+1} из ${rev.total}</div>
    <div class="task">${esc(b.raw_text)}</div>${warn}
    <button class="b-primary" onclick="revAct('focus')">1 🎯 В фокус</button>
    <button onclick="revKeep()">2 Оставить ›</button>
    <button class="b-danger" onclick="revAct('trash')">3 🗑 Пофиг</button>
  </div>`;
}
async function revAct(to){
  const b=rev.q[0];
  const col=to==='focus'?'var(--accent)':to==='trash'?'var(--danger)':'var(--dim)';
  sideGlow(col,to==='focus'?'🎯':to==='trash'?'🗑':'✅');
  $('#c').classList.add('fly');beep(to==='trash'?180:560,.12);
  try{await api('/move',{id:b.id,to})}catch(e){$('#c').classList.remove('fly');renderRev();return}
  rev[to==='trash'?'trashed':'taken']++;
  if(to==='focus'){focusN++;focusWarn();}
  rev.q.shift();setTimeout(renderRev,280);
}
function revKeep(){
  sideGlow('var(--dim)','✅');
  $('#c').classList.add('flyl');beep(300,.06);
  rev.kept++;rev.q.shift();setTimeout(renderRev,260);
}
function finishRev(){
  window.WH_setLoadBar&&window.WH_setLoadBar(100,'ревью готово');
  beep(660,.1);setTimeout(()=>beep(880,.14),120);
  $('#stage').innerHTML=`<div class="card in" style="padding:40px 0">
    <div style="font-size:19px">🧹 Ревью «${esc(rev.title)}» готово</div>
    <div class="meta" style="margin-top:10px">взял в фокус: ${rev.taken} · выкинул: ${rev.trashed} · лежат дальше: ${rev.kept}</div>
    <div style="margin-top:16px"><button class="b-ghost" onclick="rev=null;mode='list';load()">← к проекту</button></div>
  </div>`;
}
function editCrumb(pid){
  const p=curPallet();
  const v=prompt((window.WH_T||String)('🔖 На чём встал / почему (пусто — стереть):'), (p&&p.breadcrumb)||'');
  if(v===null)return;
  api('/pallet/breadcrumb',{id:pid,text:v.trim()}).then(load);
}
async function stepWait(id){
  try{await api('/move',{id,to:'waiting'})}catch(e){return}
  beep(300,.12);load();
}
async function addStepWait(pid){
  const v=$('#ns').value.trim(); if(!v)return;
  // шаг рождается в фокусе и тут же уезжает в Ожидание - grow-таймер 1-3-7-14
  let r;try{r=await api('/pallet/step',{pallet_id:pid,text:v})}catch(e){return}
  try{await api('/move',{id:r.step_id,to:'waiting'})}catch(e){}
  beep(300,.12);load();
}
function curPallet(){
  // не «есть ли неоформленные», а «смотрим ли карточку проекта»: раньше любой
  // неоформленный проект глушил клавишу P на всей странице (#47)
  if(mode!=='list')return null;
  return pi<pallets.length?pallets[pi]:frozen[pi-pallets.length];
}
async function bump(id){
  const p=id?{id}:curPallet(); if(!p)return;
  await api('/pallet/bump',{id:p.id});
  beep(560,.08); pi=0; load();
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(mode==='rev'){
    if(e.key==='1')revAct('focus'); if(e.key==='2')revKeep(); if(e.key==='3')revAct('trash');
    return}
  if(e.key==='ArrowLeft')pg(-1); if(e.key==='ArrowRight')pg(1);
  if(['p','P','з','З'].includes(e.key))bump();
});
load();
</script>
