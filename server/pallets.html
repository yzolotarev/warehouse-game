<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script>
<title>🧱 Паллетная зона</title>
<style>
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(680px,94vw);padding:24px 0;display:flex;flex-direction:column;height:100%;box-sizing:border-box}
  h1{margin:0}
  #sub{margin-bottom:18px}
  .raw{font-size:19px;font-weight:500;line-height:27px;margin-bottom:14px}
  input{width:100%;box-sizing:border-box;margin-bottom:10px}
  label{font-size:12.5px;color:var(--dim)}
  .ptitle{font-size:20px;font-weight:600;line-height:27px}
  .crit{font-size:13px;color:var(--dim);margin:6px 0 12px}
  .step{font-size:15px;line-height:22px;padding:3px 0}
  .step.done{opacity:.5;text-decoration:line-through}
  .muted{color:var(--dim);font-size:14px;text-align:center;padding:30px 0}
  #pager{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px}
  #cnt{color:var(--dim);font-size:13px}
  .fly{animation:fly .4s ease forwards}
  @keyframes fly{to{transform:translateX(120%) rotate(5deg);opacity:0}}
  .flyl{animation:flyl .35s ease forwards}
  @keyframes flyl{to{transform:translateX(-120%) rotate(-4deg);opacity:0}}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  .inl{animation:inl .3s ease}
  @keyframes inl{from{transform:translateX(40px);opacity:0}}
  .inr{animation:inr .3s ease}
  @keyframes inr{from{transform:translateX(-40px);opacity:0}}
</style>
</head>
<body><div id="wrap">
  <h1>🧱 Проекты <span style="color:var(--dim);font-weight:normal">= дела в несколько шагов (паллетная зона)</span></h1>
  <div id="sub">здесь проект получает цель («готово, когда...») и следующий конкретный шаг. Шаг уходит в Фокус - список «делаю сейчас».</div>
  <div id="stage"></div>
  <div id="pager" style="display:none">
    <button class="b-ghost" onclick="pg(-1)">‹</button><span id="cnt"></span><button class="b-ghost" onclick="pg(1)">›</button>
  </div>
</div>
<script>
"use strict";
window.WH_LOADBAR_OWNED=true; // нижняя шкала здесь = прогресс шагов текущего проекта, не часы дня
const $=s=>document.querySelector(s);
let unformed=[], pallets=[], frozen=[], seriesPts=2, pi=0;
function loadBar(nDone,nSteps,title){
  if(!window.WH_setLoadBar)return;
  if(nSteps===undefined){window.WH_setLoadBar(0,'нет открытого проекта');return}
  const p=nSteps?Math.round(nDone/nSteps*100):0;
  window.WH_setLoadBar(p,title+`: ${nDone}/${nSteps} шагов`);
}
async function api(p,body){
  const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});
  if(r.status===423){alert('⛔ Склад стоит: сначала разбери инбокс (/terminal)');throw new Error('blocked')}
  return r.json()
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function load(){
  const d=await api('/pallets');
  unformed=d.unformed; pallets=d.pallets; frozen=d.frozen||[]; seriesPts=d.series_points||2;
  pi=Math.min(pi,Math.max(0,pallets.length+frozen.length-1));
  render();
}
let inCls='in';
let mode='list'; // list = проекты; form = оформление новых
function render(){
  $('#pager').style.display='none';
  const total=pallets.length+frozen.length;
  if(mode==='form'&&!unformed.length)mode='list';
  if(!total&&unformed.length)mode='form'; // проектов нет вообще - сразу оформление
  if(mode==='form'){
    loadBar();
    const b=unformed[0];
    $('#stage').innerHTML=`<div class="card ${inCls}" id="c">
      <div style="color:var(--dim);font-size:12px;margin-bottom:6px">новых проектов на оформление: ${unformed.length}</div>
      <div class="raw">🌫 ${esc(b.raw_text)}</div>
      <label>Название проекта</label><input id="t" value="${esc(b.raw_text.slice(0,60))}">
      <label>Готово, когда...</label><input id="cr" placeholder="конкретный образ результата">
      <label>Первый шаг — маленький и конкретный (уедет в 🎯 Фокус)</label><input id="st" placeholder="настолько простой, что не о чем думать">
      <div style="display:flex;gap:10px">
        <button class="b-primary" onclick="formPallet(${b.id})">Оформить</button>
        <button class="b-ghost" onclick="skip()">Позже ›</button>
        <button class="b-danger" title="передумал — проекта не будет" onclick="trashUnformed(${b.id})">🗑 Не нужен</button>
      </div>
      <div class="meta" style="margin-top:12px;cursor:pointer" onclick="mode='list';render()">‹ к проектам (оформлю позже)</div>
    </div>`;
    return;
  }
  const banner=unformed.length
    ?`<div class="card" style="padding:12px 18px;margin-bottom:12px;cursor:pointer;border-color:var(--accent)"
        onclick="mode='form';render()">🌫 Новых проектов на оформление: <b>${unformed.length}</b> →</div>`:'';
  if(!total){loadBar();$('#stage').innerHTML='<div class="card muted"><img class="empty-ill" src="/assets/empty-pallets.png" alt="">Проектов нет. ✨ Проект рождается на разборе входящих: ответ «🧱 Проект» приводит его сюда.</div>';return}
  if(pi>=pallets.length){renderFrozen(frozen[pi-pallets.length],total);return}
  const p=pallets[pi];
  const steps=p.steps.map(s=>`<div class="step ${['done','archived'].includes(s.shelf)?'done':''}">
    ${['done','archived'].includes(s.shelf)?'✅':(s.shelf==='focus'?'🎯':'·')} ${esc(s.raw_text)}</div>`).join('')||'<div class="muted">шагов нет</div>';
  const idle=p.idle_days>7?`<div class="crit" style="color:var(--sand)">🕸 без движения ${p.idle_days} дн. (месяц — и уедет в морозилку)</div>`:'';
  const series=p.done_today?`<div class="crit" style="color:var(--vio)">🔥 серия: сегодня по этой паллете уже сделано ${p.done_today} — следующий шаг даст +${seriesPts} сверху</div>`:
    `<div class="crit">💡 второй шаг этой паллеты за день пойдёт серией: +${seriesPts} к очкам</div>`;
  const nSteps=p.steps.length, nDone=p.steps.filter(s=>['done','archived'].includes(s.shelf)).length;
  loadBar(nDone,nSteps,p.title);
  const seriesHint=p.done_today
    ?`<div class="meta" style="color:var(--vio);margin-top:8px">🔥 серия: сегодня уже ${p.done_today} — следующий шаг +${seriesPts} сверху</div>`
    :`<div class="meta" style="margin-top:8px">💡 второй шаг за день пойдёт серией: +${seriesPts}</div>`;
  $('#stage').innerHTML=banner+`<div class="card ${inCls}">
    <div class="ptitle">${esc(p.title)}</div>
    ${idle}
    <div style="display:flex;gap:8px;margin-top:14px">
      <input id="ns" placeholder="следующий шаг — маленький и конкретный" style="margin:0">
      <button class="b-primary" style="white-space:nowrap" onclick="addStep(${p.id})">→ 🎯 В фокус</button>
    </div>
    ${seriesHint}
    <details class="drawer" style="margin-top:14px">
      <summary>Цель и шаги (${nDone}/${nSteps})</summary>
      <div class="drawer-body">
        <div class="crit">Готово, когда: ${esc(p.done_criteria||'—')}</div>
        ${steps}
      </div>
    </details>
    <details class="drawer" ontoggle="if(this.open)noteLoad(${p.id})">
      <summary>Заметка проекта${p.note_path?'':' · нет'}</summary>
      <div class="drawer-body">
        <div id="notefiles" class="meta" style="margin-bottom:6px"></div>
        <textarea id="notebody" spellcheck="false" oninput="noteDirty()" style="width:100%;box-sizing:border-box;height:240px;
          resize:vertical;font-size:13px;line-height:1.5;white-space:pre-wrap"></textarea>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
          <button id="notesave" class="b-sec" style="display:none" onclick="noteSave(${p.id})">💾 Сохранить в Obsidian</button>
          <span id="notestat" class="meta">правь прямо здесь · перед записью делается бэкап</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="na" placeholder="или быстро дописать строку в конец" style="margin:0">
          <button class="b-ghost" onclick="noteAppend(${p.id})">＋</button>
        </div>
        <div id="attachwrap" style="margin-top:8px">${p.note_path?'':'<button class="b-ghost" onclick="showAttach('+p.id+')">📎 привязать существующий файл</button>'}</div>
      </div>
    </details>
    <details class="drawer">
      <summary>Управление</summary>
      <div class="drawer-body">
        <button class="b-ghost" onclick="bump(${p.id})" title="клавиша P">📌 На первое место</button>
        <button class="b-ghost" onclick="freeze(${p.id},true)">🧊 Заморозить проект</button>
        <button class="b-danger" onclick="delPallet(${p.id})">🗑 Не нужен</button>
      </div>
    </details>
  </div>`;
  $('#pager').style.display='flex';
  $('#cnt').textContent=`паллета ${pi+1} / ${total} · P = наверх`;
}
function renderFrozen(p,total){
  const nSteps=p.steps.length, nDone=p.steps.filter(s=>['done','archived'].includes(s.shelf)).length;
  loadBar(nDone,nSteps,p.title+' (🧊)');
  $('#stage').innerHTML=`<div class="card ${inCls}" style="opacity:.75">
    <div class="ptitle">🧊 ${esc(p.title)} <span style="font-size:12px;color:var(--dim)">заморожена</span></div>
    <div class="crit">Готово, когда: ${esc(p.done_criteria||'—')}</div>
    <div class="muted" style="padding:10px 0">спит. Разморозка — только руками.</div>
    <button class="b-sec" onclick="freeze(${p.id},false)">▶️ Разморозить</button>
    <button class="b-danger" onclick="delPallet(${p.id})">🗑 Не нужен</button>
  </div>`;
  $('#pager').style.display='flex';
  $('#cnt').textContent=`паллета ${pi+1} / ${total} · морозилка`;
}
async function freeze(id,fr){
  await api('/pallet/freeze',{id,frozen:fr});
  beep(fr?240:600,.12); load();
}
async function delPallet(id){
  if(!confirm('Удалить проект? Несделанные шаги уедут в мусор.'))return;
  const r=await api('/pallet/delete',{id});
  beep(180,.15); pi=0; load();
}
function pg(d){const n=pallets.length+frozen.length;pi=(pi+d+n)%n;inCls=d>0?'inl':'inr';render();inCls='in'}
function skip(){
  const c=$('#c');c.classList.add('flyl');
  setTimeout(()=>{unformed.push(unformed.shift());render()},280);
}
let noteHash=null;
async function noteLoad(pid){
  const d=await api('/pallet_note?id='+pid);
  $('#notebody').value=d.content||'';
  noteHash=d.hash;
  $('#notefiles').textContent=d.files.length?('📁 в папке проекта: '+d.files.join(' · ')):'';
  $('#notesave').style.display='none';
  $('#notestat').textContent='правь прямо здесь · перед записью делается бэкап';
}
function noteDirty(){$('#notesave').style.display='inline-block';
  $('#notestat').textContent='есть несохранённые правки';}
async function noteSave(pid){
  const r=await fetch('/pallet/note_save',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:pid,content:$('#notebody').value,base_hash:noteHash})});
  if(r.status===409){
    $('#notestat').textContent='⚠ файл параллельно изменён в Obsidian — скопируй правки, закрой и открой заметку заново';
    beep(180,.15);return}
  const d=await r.json(); noteHash=d.hash;
  $('#notesave').style.display='none';
  $('#notestat').textContent='💾 сохранено '+new Date().toLocaleTimeString().slice(0,5);
  beep(620,.1);
}
async function noteAppend(pid){
  const v=$('#na').value.trim(); if(!v)return;
  await api('/pallet/note_append',{id:pid,text:v});
  $('#na').value=''; beep(620,.1);
  const d=await api('/pallet_note?id='+pid);
  if($('#notebody')){$('#notebody').value=d.content||''; noteHash=d.hash;}
}
async function showAttach(pid){
  const files=await api('/obsidian_files');
  const opts=files.map(f=>`<option value="${f.path.replace(/"/g,'&quot;')}">${f.name}</option>`).join('');
  $('#attachwrap').innerHTML=files.length
    ?`<div style="display:flex;gap:8px">
        <select id="af" style="flex:1">${opts}</select>
        <button class="b-sec" onclick="doAttach(${pid})">📎 Привязать</button>
      </div>`
    :'<div class="meta">папка проектов Obsidian пуста или недоступна · допиши строку выше — файл создастся сам</div>';
}
async function doAttach(pid){
  await api('/pallet/note_attach',{id:pid,path:$('#af').value});
  beep(560,.1); load();
}
async function trashUnformed(id){
  // несформированный проект = обычный товар на полке pallet_step: в мусор через /move
  $('#c').classList.add('fly');
  beep(180,.12);
  await api('/move',{id,to:'trash'});
  setTimeout(()=>{if(unformed.length<=1)mode='list';load()},280);
}
async function formPallet(id){
  const title=$('#t').value.trim(), crit=$('#cr').value.trim(), step=$('#st').value.trim();
  if(!title)return;
  $('#c').classList.add('fly');
  beep(560,.12);
  await api('/pallet',{title,done_criteria:crit,from_box:id,first_step:step});
  setTimeout(()=>{if(unformed.length<=1)mode='list';load()},280);
}
function beep(f,d){try{const a=beep.ac=beep.ac||new AudioContext(),o=a.createOscillator(),g=a.createGain();
  o.type='triangle';o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(a.destination);
  o.start();g.gain.exponentialRampToValueAtTime(1e-4,a.currentTime+d);o.stop(a.currentTime+d)}catch(e){}}
async function addStep(pid){
  const v=$('#ns').value.trim(); if(!v)return;
  await api('/pallet/step',{pallet_id:pid,text:v});
  load();
}
function curPallet(){
  if(unformed.length)return null;
  return pi<pallets.length?pallets[pi]:frozen[pi-pallets.length];
}
async function bump(id){
  const p=id?{id}:curPallet(); if(!p)return;
  await api('/pallet/bump',{id:p.id});
  beep(560,.08); pi=0; load();
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowLeft')pg(-1); if(e.key==='ArrowRight')pg(1);
  if(['p','P','з','З'].includes(e.key))bump();
});
load();
</script>
</body>
</html>
