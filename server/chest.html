<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="/assets/favicon.png">
<meta charset="utf-8">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/welcome.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script><script src="/ambient.js"></script><script src="/juice.js"></script>
<title>🏆 Сундук</title>
<style>
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(640px,94vw);padding:22px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{margin:0}
  #sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  .card{text-align:center}
  .task{font-size:21px;line-height:1.4;margin:10px 0 16px}
  .meta{font-size:12px;color:var(--dim)}
  button{margin:0 6px}
  .muted{color:var(--dim);text-align:center;padding:40px 0;font-size:15px}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  a{font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
  .item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;
    margin-bottom:8px;display:flex;align-items:center;gap:12px}
  .item.bought{opacity:.5}
  .item .ti{font-size:15px;font-weight:500;flex:1}
  .item .pr{color:var(--gold);font-size:14px;white-space:nowrap}
  #new{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
  #new input{flex:1;min-width:120px}
  #new input[type=number]{width:70px;flex:none}
  #list{flex:1 1 auto;overflow-y:auto;min-height:0}
</style>
</head>
<body><div id="wrap">
  <h1>🏆 Сундук <span style="color:var(--dim);font-weight:normal">= на что копим ⭐</span></h1>
  <div id="sub">заработал очки — потрать на награду</div>
  <div id="ptsbar" style="text-align:center;font-size:18px;margin-bottom:16px;color:var(--gold)">⭐ <span id="pts">0</span></div>
  <div id="new">
    <input id="nt" placeholder="название награды">
    <input id="nc" type="number" value="50" min="1" placeholder="⭐">
    <button onclick="addChest()">➕ добавить</button>
  </div>
  <!-- 📦 Ящик: случайность в том, ЧТО выпало, а не выпало ли. Пустышек нет,
       один ящик в сутки, платного ускорения открытия нет -->
  <div id="roll" style="border:1px solid var(--gold);border-radius:10px;padding:14px 18px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:180px">
        <div style="font-size:15px;font-weight:500">📦 Ящик <span class="meta">— один в день</span></div>
        <div class="meta" id="rollInfo"></div>
      </div>
      <button id="rollBtn" class="b-primary" onclick="roll()">🎲 Крутить ящик</button>
    </div>
    <div id="pool" style="margin-top:12px"></div>
    <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">
      <input id="pt" placeholder="награда в пул розыгрыша" style="flex:1;min-width:140px">
      <select id="pr" title="редкость: чем выше, тем чаще выпадает">
        <option value="3">частая</option><option value="2" selected>обычная</option><option value="1">редкая</option>
      </select>
      <button class="b-ghost" onclick="addPool()">➕ в пул</button>
    </div>
  </div>
  <div id="list"></div>
  <a href="/">← в прихожую склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
async function api(p,body){const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});return r.json()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
const RARITY={3:'частая',2:'обычная',1:'редкая'};
let prizeTimer=null;
function renderRoll(d){
  const pool=d.items.filter(x=>x.kind==='pool');
  const prize=d.items.filter(x=>x.kind==='prize'&&!x.bought_at)[0];
  $('#pool').innerHTML=pool.length
    ?pool.map(x=>`<div class="item" style="padding:8px 12px;margin-bottom:5px">
        <div class="ti" style="font-size:13px">${esc(x.title)}</div>
        <div class="meta">${RARITY[x.rarity]||'обычная'}</div>
        <button class="b-ghost" style="font-size:11px;padding:4px 8px" onclick="del(${x.id})">✕</button>
      </div>`).join('')
    :'<div class="meta">пул пуст — добавь минимум 3 награды, иначе розыгрыш не запустится</div>';
  const btn=$('#rollBtn');
  if(prizeTimer){clearInterval(prizeTimer);prizeTimer=null}
  if(prize){
    btn.textContent='📦 Открыть ящик';btn.onclick=openPrize;
    const tick=()=>{
      const left=Math.ceil((new Date(prize.opens_at.replace(' ','T'))-new Date())/1000);
      if(left>0){
        btn.disabled=true;
        $('#rollInfo').textContent='ящик в пути · откроется через '
          +Math.floor(left/60)+':'+String(left%60).padStart(2,'0');
      }else{btn.disabled=false;$('#rollInfo').textContent='ящик приехал — открывай';
            clearInterval(prizeTimer);prizeTimer=null}
    };
    tick();prizeTimer=setInterval(tick,1000);
  }else{
    btn.textContent='🎲 Крутить ящик';btn.onclick=roll;
    const cost=d.roll_cost||40;
    btn.disabled=pool.length<3||d.points_total<cost||d.rolled_today;
    $('#rollInfo').textContent=
      d.rolled_today?'сегодняшний ящик уже открыт — следующий завтра'
      :pool.length<3?'нужно ещё '+(3-pool.length)+' наград(ы) в пуле'
      :cost+' ⭐ · выпадет одна из '+pool.length+' твоих наград, откроется через '
        +(d.roll_delay_min||45)+' минут';
  }
}
async function roll(){
  const r=await fetch('/chest_roll',{method:'POST'});
  if(!r.ok){const e=await r.json();alert(e.detail||'ошибка');return}
  window.juice&&juice('roll');
  load();
}
async function openPrize(){
  const r=await fetch('/chest_open',{method:'POST'});
  if(!r.ok){const e=await r.json();alert(e.detail||'ошибка');return}
  const d=await r.json();
  window.juiceWin&&juiceWin(d.title);
  load();
}
async function addPool(){
  const title=$('#pt').value.trim();
  if(!title)return;
  await api('/chest_add',{title,cost:0,kind:'pool',rarity:parseInt($('#pr').value)});
  $('#pt').value='';load();
}
async function load(){
  const d=await api('/chest');
  $('#pts').textContent=d.points_total;
  renderRoll(d);
  const shop=d.items.filter(x=>x.kind!=='pool'&&x.kind!=='prize');
  const avail=shop.filter(x=>!x.bought_at),bought=shop.filter(x=>x.bought_at);
  let h='';
  if(!avail.length&&!bought.length){h='<div class="muted">Сундук пуст. Добавь награду, на которую копишь очки.</div>'}
  if(avail.length){
    h+='<div class="meta" style="margin-bottom:8px">Доступно</div>';
    for(const x of avail){
      const ok=d.points_total>=x.cost;
      h+=`<div class="item in">
        <div class="ti">${esc(x.title)}</div>
        <div class="pr">⭐ ${x.cost}</div>
        <button class="${ok?'b-primary':'b-ghost'}" ${ok?`onclick="buy(${x.id})"`:'disabled'}>${ok?'Забрать':'⭐ не хватает'}</button>
        <button class="b-ghost" style="font-size:11px;padding:4px 8px" onclick="del(${x.id})">✕</button>
      </div>`;
    }
  }
  if(bought.length){
    h+='<div class="meta" style="margin:12px 0 8px">Куплено</div>';
    for(const x of bought){
      h+=`<div class="item bought">
        <div class="ti">${esc(x.title)}</div>
        <div class="pr" style="color:var(--dim)">⭐ ${x.cost}</div>
        <span style="font-size:11px;color:var(--dim)">${(x.bought_at||'').slice(0,10)}</span>
      </div>`;
    }
  }
  $('#list').innerHTML=h;
}
async function addChest(){
  const title=$('#nt').value.trim(),cost=parseInt($('#nc').value);
  if(!title||cost<1)return;
  await api('/chest_add',{title,cost});
  $('#nt').value='';load();
}
async function buy(id){
  const r=await fetch('/chest_buy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  if(!r.ok){const e=await r.json();alert(e.detail||'ошибка');return}
  load();
}
async function del(id){
  await api('/chest_delete',{id});
  load();
}
load();
</script>
</body>
</html>
