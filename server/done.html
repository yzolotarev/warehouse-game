<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script>
<title>🚚 Отгрузка</title>
<style>
  
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(640px,94vw);padding:22px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{margin:0}
  #sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  .card{text-align:center}
  .task{font-size:21px;line-height:1.4;margin:10px 0 16px}
  .meta{font-size:12px;color:var(--dim)}
  button{margin:0 6px}
  #pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
  #cnt{color:var(--dim);font-size:13px}
  .muted{color:var(--dim);text-align:center;padding:40px 0;font-size:15px}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  a{font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
</style>
</head>
<body><div id="wrap">
  <h1>✅ Сделано сегодня <span style="color:var(--dim);font-weight:normal">= отгрузка</span></h1>
  <div id="sub">лежит на виду до <span id="truck">22:00</span> — потом фура увезёт в архив</div>
  <div id="stage"></div>
  <div id="pager" style="display:none">
    <button class="b-ghost" onclick="pg(-1)">‹</button><span id="cnt"></span><button class="b-ghost" onclick="pg(1)">›</button>
  </div>
  <a href="/">← в прихожую склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
let items=[], i=0;
async function api(p,body){const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});return r.json()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function load(){
  items=await api('/boxes?shelf=done');
  const st=await api('/state');
  $('#truck').textContent=st.truck_at;
  i=Math.min(i,Math.max(0,items.length-1)); render();
}
function render(){
  if(!items.length){$('#stage').innerHTML='<div class="card muted">Пока пусто. Сделай что-нибудь из 🎯 Фокуса — и оно ляжет сюда, на витрину дня.</div>';
    $('#pager').style.display='none';return}
  const b=items[i];
  $('#stage').innerHTML=`<div class="card in">
    <div class="meta">#${b.id}</div>
    <div class="task">✅ ${esc(b.raw_text)}</div>
    <button class="b-ghost" onclick="back(${b.id})">↩ вернуть в фокус (не доделано)</button>
  </div>`;
  $('#pager').style.display=items.length>1?'flex':'none';
  $('#cnt').textContent=(i+1)+' / '+items.length;
}
function pg(d){i=(i+d+items.length)%items.length;render()}
async function back(id){
  const r=await fetch('/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,to:'focus'})});
  if(r.status===423){$('#stage').insertAdjacentHTML('afterbegin',
    '<div class="card" style="border-color:var(--danger);color:var(--danger);margin-bottom:12px;cursor:pointer" onclick="location.href=\'/terminal\'">⛔ Склад стоит: разбери входящие →</div>');return}
  load()}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')pg(-1); if(e.key==='ArrowRight')pg(1);
});
load();
</script>
</body>
</html>
