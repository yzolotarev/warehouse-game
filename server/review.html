<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="/assets/favicon.png">
<meta charset="utf-8">
<meta name="theme-color" content="#101014">
<meta name="color-scheme" content="dark light">
<link rel="stylesheet" href="/style.css">
<script src="/theme.js"></script><script src="/welcome.js"></script><script src="/i18n.js"></script><script src="/storozh.js"></script><script src="/ambient.js"></script><script src="/juice.js"></script>
<title>🧰 Общая пересборка</title>
<style>
  html,body{margin:0;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  #wrap{width:min(660px,94vw);padding:24px 0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  h1{margin:0}
  #sub{margin-bottom:18px}
  .card{text-align:center}
  .task{font-size:19px;font-weight:500;line-height:27px;margin:10px 0 18px}
  .q{font-size:16px;font-weight:600;color:var(--accent);margin:14px 0 12px}
  .stat{font-size:34px;font-weight:700;color:var(--accent)}
  .statrow{display:flex;justify-content:center;gap:34px;margin:18px 0}
  .statlbl{font-size:12px;color:var(--dim)}
  button{margin:0 5px}
  .b-go{font-size:16px;padding:14px 26px}
  input{width:100%;box-sizing:border-box;margin-bottom:10px}
  .steps{text-align:left;font-size:14px;margin:8px 0 4px}
  .steps .done{opacity:.5;text-decoration:line-through}
  .fly{animation:fly .4s ease forwards}
  @keyframes fly{to{transform:translateX(120%) rotate(5deg);opacity:0}}
  .in{animation:inup .3s ease}
  @keyframes inup{from{transform:translateY(16px);opacity:0}}
  #banner{display:none;background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);
    padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:14px;cursor:pointer}
  a{font-size:13px;text-decoration:none;margin-top:auto;text-align:center}
</style>
</head>
<body><div id="wrap">
  <h1>🧰 Общая пересборка <span style="color:var(--dim);font-weight:normal">= General Review</span></h1>
  <div id="sub">столп №2: каждые 3 дня пройтись по всему складу, чтобы он не сгнил</div>
  <div id="banner" onclick="location.href='/terminal'">⛔ Склад стоит: сначала разбери инбокс →</div>
  <div id="sideglow" style="display:none;position:fixed;inset:0;pointer-events:none;z-index:1"></div>
  <div id="stage"></div>
  <a href="/">← в прихожую склада</a>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
let D=null, racks=[], pallets=[], frozen=[], focusItems=[], firstBox=true, history=[];
async function api(p,body){
  const r=await fetch(p,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});
  if(r.status===423){$('#banner').style.display='block';throw new Error('blocked')}
  return r.json()
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function beep(f,d){try{const a=beep.ac=beep.ac||new AudioContext(),o=a.createOscillator(),g=a.createGain();
  o.type='triangle';o.frequency.value=f;g.gain.value=.04;o.connect(g);g.connect(a.destination);
  o.start();g.gain.exponentialRampToValueAtTime(1e-4,a.currentTime+d);o.stop(a.currentTime+d)}catch(e){}}
function sideGlow(color,label){
  const el=$('#sideglow');el.style.display='block';el.style.transition='none';
  // фоновая вспышка
  el.style.background=`linear-gradient(90deg,${color}22 0%,transparent 20%,transparent 80%,${color}22 100%)`;
  el.textContent='';  // иконки по краям
  const L=document.createElement('span');L.textContent='◀';L.style.cssText=`position:fixed;left:12px;top:50%;transform:translateY(-50%);font-size:28px;color:${color};opacity:.6`;
  const R=document.createElement('span');R.textContent='▶';R.style.cssText=`position:fixed;right:12px;top:50%;transform:translateY(-50%);font-size:28px;color:${color};opacity:.6`;
  el.appendChild(L);el.appendChild(R);
  // чуть погодя — плавно гаснет
  requestAnimationFrame(()=>{el.style.transition='opacity .5s ease,background .5s ease';
    el.style.background='transparent';el.style.opacity='0';
    setTimeout(()=>{el.style.display='none';el.style.opacity='1';el.innerHTML=''},600);});
  // метка на стадии
  const m=$('.meta');if(m){const old=m.textContent;m.textContent=label+' · '+old;
    setTimeout(()=>{if(m.textContent.includes(label))m.textContent=old},700);}
}
async function load(){
  D=await api('/review_data');
  racks=D.racks; pallets=D.pallets; frozen=D.frozen; focusItems=D.focus_items||[];
  intro();
}
function intro(){
  $('#stage').innerHTML=`<div class="card in">
    <div class="meta">дней на складе</div>
    <div class="statrow">
      <div><div class="stat">${D.period_points}</div><div class="statlbl">очков</div></div>
      <div><div class="stat">${D.shipped}</div><div class="statlbl">отгружено</div></div>
      <div><div class="stat">${D.born}</div><div class="statlbl">коробок прибыло</div></div>
    </div>
    <div class="meta">впереди: стеллажи (${racks.length}) → паллеты (${pallets.length})${D.focus_review?` → 🎯 фокус (${D.focus_count})`:''} → морозилка (${frozen.length})</div>
    <div class="q">награда за пересборку: +${D.reward} очков</div>
    <button class="b-primary b-go" onclick="rackStep()">→ начать</button>
  </div>`;
}
/* этап 1: стеллажи по одному */
function rackStep(){
  if(!racks.length){palletStep();return}
  const b=racks[0];
  const showQ=firstBox?'Ещё актуально?':''; // вопрос — только на первом проходе
  firstBox=false;
  $('#sub').style.display='none'; // убрать подпись после старта
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="meta">стеллажи · осталось ${racks.length} · ${esc(b.context||'без контекста')}</div>
    <div class="task">${esc(b.raw_text)}</div>
    ${showQ?`<div class="q">${showQ}</div>`:''}
    <button class="b-sec" onclick="rackAct('focus')">1 🎯 В фокус</button>
    <button onclick="rackAct(null)">2 ⏸ Лежит дальше</button>
    <button class="b-danger" onclick="rackAct('trash')">3 🗑 Уже нет</button>
    <button class="b-ok" onclick="rackAct('done')">4 ✅ Выполнено</button>
    ${history.length?`<br><button class="b-ghost" onclick="undoRack()" style="margin-top:8px;font-size:12px">↩ Отменить (Backspace)</button>`:''}
  </div>`;
}
async function rackAct(to){
  const b=racks.shift();
  const colors={focus:'var(--accent)',null:'var(--dim)',trash:'var(--danger)',done:'var(--gold)'};
  const labels={focus:'🎯',null:'⏸',trash:'🗑',done:'✅'};
  sideGlow(colors[to]||'var(--dim)',labels[to]||'✅');
  $('#c').classList.add('fly');beep(to==='trash'?180:520,.1);
  history.push({box:b,action:to});
  try{await api('/review_rack_decide',{box_id:b.id,action:to||'null'})}catch(e){}
  if(to==='done'){try{await api('/move',{id:b.id,to:'done'})}catch(e){}}
  else if(to){try{await api('/move',{id:b.id,to})}catch(e){}}
  if(to==='focus')focusWarn(document.querySelector('#stage button'));
  setTimeout(rackStep,260);
}
async function undoRack(){
  if(!history.length)return;
  const last=history.pop();
  const b=last.box; const to=last.action;
  beep(440,.08);
  await api('/review_rack_undo',{box_id:b.id,action:to||'null'});
  racks.unshift(b);
  firstBox=false;
  if(document.querySelector('#stage .card'))rackStep();
}
/* этап 2: живые паллеты по одной */
function palletStep(){
  if(!pallets.length){focusStep();return}
  const p=pallets[0];
  const steps=p.steps.map(s=>`<div class="${['done','archived'].includes(s.shelf)?'done':''}">
    ${['done','archived'].includes(s.shelf)?'✅':(s.shelf==='focus'?'🎯':'·')} ${esc(s.raw_text)}</div>`).join('')||'<span class="meta">шагов нет</span>';
  const idle=p.idle_days>7?`<span style="color:#e6a08e"> · 🕸 без движения ${p.idle_days} дн.</span>`:'';
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="meta">🧱 паллеты · осталось ${pallets.length}${idle}</div>
    <div class="task" style="color:var(--vio)">${esc(p.title)}</div>
    <div class="meta">готово, когда: ${esc(p.done_criteria||'—')}</div>
    <div class="steps">${steps}</div>
    <div class="q">Проект живёт? Дай следующий шаг — или заморозь.</div>
    <input id="ns" placeholder="следующий одношаговый шаг (уедет в 🎯)">
    <div>
      <button class="b-sec" onclick="palletAdd(${p.id})">→ 🎯 шаг в фокус</button>
      <button onclick="palletOk()">Шаг уже есть ›</button>
      <button class="b-ghost" onclick="palletSuggest(${p.id}, this)">🧠 Предложи шаг</button>
    </div>
    <div style="margin-top:8px">
      <button class="b-ghost" onclick="palletScary(${p.id})">😰 Трудно понять, что дальше</button>
      <button class="b-ghost" onclick="palletFreeze(${p.id})">🧊 Заморозить</button>
      <button class="b-danger" onclick="delPalletRev(${p.id})">🗑 Удалить проект</button>
    </div>
  </div>`;
  $('#ns').focus();
}
async function palletAdd(pid){
  const v=$('#ns').value.trim(); if(!v){$('#ns').focus();return}
  try{await api('/pallet/step',{pallet_id:pid,text:v})}catch(e){return}
  beep(560,.12); pallets.shift();
  $('#c').classList.add('fly'); setTimeout(palletStep,260);
}
function palletOk(){
  pallets.shift(); beep(420,.06);
  $('#c').classList.add('fly'); setTimeout(palletStep,260);
}
async function palletFreeze(pid){
  await api('/pallet/freeze',{id:pid,frozen:true});
  beep(240,.15); pallets.shift();
  $('#c').classList.add('fly'); setTimeout(palletStep,260);
}
async function delPalletRev(pid){
  if(!confirm((window.WH_T||String)('Удалить проект? Несделанные шаги уедут в мусор.')))return;
  await api('/pallet/delete',{id:pid});
  beep(180,.15); pallets.shift();
  $('#c').classList.add('fly'); setTimeout(palletStep,260);
}
async function palletSuggest(pid, btn){
  const was=btn.textContent; btn.disabled=true; btn.textContent='🧠 думает…';
  try{
    const r=await api('/pallet/suggest_step',{id:pid});
    if(r&&r.suggestion){$('#ns').value=r.suggestion; $('#ns').focus();}
    else{$('#ns').placeholder='⚠ ии не ответил, впиши сам';}
  }catch(e){$('#ns').placeholder='⚠ ии не ответил, впиши сам';}
  btn.disabled=false; btn.textContent=was;
}
async function palletScary(pid){
  await api('/pallet/scary',{id:pid});
  beep(560,.12); pallets.shift();
  $('#c').classList.add('fly'); setTimeout(palletStep,260);
}
/* этап 2.5: фокус переполнен — разгружаем */
function focusStep(){
  if(!focusItems.length){frozenStep();return}
  const b=focusItems[0];
  const star=b.starred?'⭐ ':'';
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="meta">🎯 фокус переполнен · осталось ${focusItems.length} · ${star}${esc(b.raw_text.slice(0,60))}</div>
    <div class="task">${esc(b.raw_text)}</div>
    <div class="q">Освободи фокус: верни на стеллаж или выбрось.</div>
    <button class="b-sec" onclick="focusAct('focus')">1 🎯 Оставить</button>
    <button class="b-ghost" onclick="focusAct('rack')">2 🗄 Вернуть на стеллаж</button>
    <button class="b-danger" onclick="focusAct('trash')">3 🗑 Уже не надо</button>
  </div>`;
}
async function focusAct(to){
  const b=focusItems.shift();
  const col=to==='focus'?'var(--accent)':to==='trash'?'var(--danger)':'var(--dim)';
  sideGlow(col,to==='focus'?'🎯':to==='trash'?'🗑':'🗄');
  $('#c').classList.add('fly');beep(to==='trash'?180:520,.1);
  try{await api('/move',{id:b.id,to})}catch(e){}
  setTimeout(focusStep,260);
}
/* этап 3: морозилка */
function frozenStep(){
  if(!frozen.length){finish();return}
  const p=frozen[0];
  $('#stage').innerHTML=`<div class="card in" id="c">
    <div class="meta">🧊 морозилка · осталось ${frozen.length}</div>
    <div class="task">${esc(p.title)}</div>
    <div class="meta">готово, когда: ${esc(p.done_criteria||'—')}</div>
    <div class="q">Размораживаем?</div>
    <button class="b-ghost" onclick="frozenAct(false)">🧊 Пусть спит</button>
    <button onclick="frozenAct(true)">▶️ Разморозить</button>
  </div>`;
}
async function frozenAct(wake){
  const p=frozen.shift();
  if(wake)await api('/pallet/freeze',{id:p.id,frozen:false});
  beep(wake?600:300,.1);
  $('#c').classList.add('fly'); setTimeout(frozenStep,260);
}
/* финал */
async function finish(){
  const r=await api('/review_finish',{});
  beep(660,.15);setTimeout(()=>beep(880,.25),140);
  $('#stage').innerHTML=`<div class="card in">
    <div style="font-size:40px">✨</div>
    <div class="task">Склад пересобран.</div>
    <div class="q">${r.points?`+${r.points} очков`:'сегодня уже пересобран — очки не дублируются'}</div>
    <div class="meta">следующая пересборка через 3 дня — склад позовёт сам</div>
    <div class="meta" style="color:#ffd97a;cursor:pointer;margin-top:8px" onclick="location.href='/focus_page'">⭐ и отметь звезду на завтра → фокус</div>
    <div style="margin-top:16px"><button class="b-primary b-go" onclick="location.href='/'">→ в прихожую</button></div>
  </div>`;
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'){if(e.key==='Enter'){const btn=document.querySelector('#stage button.b-sec');if(btn)btn.click()}return}
  if(e.key==='Backspace'){e.preventDefault();undoRack();return}
  const btns=$('#stage').querySelectorAll('button:not(.b-go)');
  if(e.key==='1'&&btns[0])btns[0].click();
  if(e.key==='2'&&btns[1])btns[1].click();
  if(e.key==='3'&&btns[2])btns[2].click();
  if(e.key==='4'&&btns[3])btns[3].click();
});
load();
</script>
</body>
</html>
